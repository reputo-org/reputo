name: Main

on:
    push:
        branches: [main]


concurrency:
    group: main-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    quality-gate:
        uses: ./.github/workflows/_quality-gate.yml
        secrets:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}


    build-and-push:
        needs: quality-gate
        permissions:
            contents: read
            packages: write
        uses: ./.github/workflows/_build-and-push.yml
        with:
            ref: ${{ github.sha }}
            push: true
            affected: false

    release:
        needs: build-and-push
        permissions:
            contents: write
            issues: write
            pull-requests: write
        uses: ./.github/workflows/_release.yml

    tag-release-images:
        needs: release
        if: ${{ needs.release.outputs.version != '' }}
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
        env:
            IMAGE_PREFIX: ghcr.io/${{ github.repository }}
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
              with:
                  sparse-checkout: apps

            - name: Login to GitHub Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Tag images with the release version
              env:
                  VERSION: ${{ needs.release.outputs.version }}
              run: |
                  set -euo pipefail
                  shopt -s nullglob
                  tagged=0
                  for dockerfile in apps/*/Dockerfile; do
                      app="$(basename "$(dirname "$dockerfile")")"
                      docker buildx imagetools create \
                          --tag "${IMAGE_PREFIX}/${app}:${VERSION}" \
                          "${IMAGE_PREFIX}/${app}:sha-${GITHUB_SHA}"
                      tagged=$((tagged + 1))
                  done
                  if [ "$tagged" -eq 0 ]; then
                      echo "No apps/*/Dockerfile found — nothing was tagged" >&2
                      exit 1
                  fi

    deploy-staging:
        needs: build-and-push
        uses: ./.github/workflows/_deploy.yml
        with:
            environment: staging
            sha: ${{ github.sha }}
            base-url: https://staging.logid.xyz

        secrets: inherit
