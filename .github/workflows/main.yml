name: main 🚢
run-name: main 🚢

on:
    push:
        branches: [main]

# Queue runs instead of cancelling them: cancelling a half-finished main run
# can leave images pushed but never deployed, or a release half-published.
concurrency:
    group: main-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read

jobs:
    quality-gate:
        uses: ./.github/workflows/_quality-gate.yml
        secrets: inherit

    # Build every app on every main commit (not just the affected ones) so
    # each commit has a complete, immutable sha-<commit> image set. That is
    # what makes "promote commit X" mean "the whole stack at commit X".
    build-and-push:
        needs: quality-gate
        permissions:
            contents: read
            packages: write
        uses: ./.github/workflows/_build-and-push.yml
        with:
            ref: ${{ github.sha }}
            push: true
            affected: false

    release:
        needs: build-and-push
        permissions:
            contents: write
            issues: write
            pull-requests: write
            id-token: write
        uses: ./.github/workflows/release.yml
        secrets: inherit

    tag-release-images:
        name: tag-release-images 🏷️
        needs: release
        if: ${{ needs.release.outputs.version != '' }}
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        permissions:
            contents: read
            packages: write
        env:
            IMAGE_PREFIX: ghcr.io/reputo-org/reputo
        steps:
            - name: Login to GitHub Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            - name: Tag images with the release version
              env:
                  VERSION: ${{ needs.release.outputs.version }}
              run: |
                  set -euo pipefail
                  for app in api ui workflows; do
                      docker buildx imagetools create \
                          --tag "${IMAGE_PREFIX}/${app}:${VERSION}" \
                          "${IMAGE_PREFIX}/${app}:sha-${GITHUB_SHA}"
                  done

    deploy-staging:
        name: deploy-staging
        needs: build-and-push
        runs-on: ubuntu-24.04
        timeout-minutes: 20
        environment:
            name: staging
            url: https://staging.logid.xyz
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Pin staging to this commit and deploy via Komodo
              env:
                  KOMODO_URL: https://komodo.logid.xyz
                  KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
                  KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
                  VARIABLE_NAME: STAGING_IMAGE_TAG
                  IMAGE_TAG: sha-${{ github.sha }}
                  STACK_NAME: reputo-apps-staging
              run: ./.github/scripts/komodo-deploy.sh

            - name: Verify the deployed commit
              env:
                  BASE_URL: https://staging.logid.xyz
                  EXPECTED_SHA: ${{ github.sha }}
              run: ./.github/scripts/verify-deploy.sh
