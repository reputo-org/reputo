name: Promote to Production 🚀
run-name: Promote to Production 🚀

on:
    workflow_dispatch:
        inputs:
            ref:
                description: 'Commit SHA or release tag (e.g. v1.4.2) to promote to production'
                required: true
                type: string

# Promotions get their own queue: they must never share a concurrency group
# with the main pipeline (a merge to main would cancel a running promotion),
# and a started promotion must never be cancelled mid-flight.
concurrency:
    group: promote-production
    cancel-in-progress: false

permissions:
    contents: read

env:
    IMAGE_PREFIX: ghcr.io/reputo-org/reputo

jobs:
    resolve-images:
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        outputs:
            commit: ${{ steps.commit.outputs.commit }}
        steps:
            - id: commit
              name: Resolve ref to a commit
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PROMOTE_REF: ${{ inputs.ref }}
              run: |
                  set -euo pipefail
                  commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${PROMOTE_REF}" --jq .sha)"
                  if ! [[ "$commit" =~ ^[0-9a-f]{40}$ ]]; then
                      echo "Could not resolve '${PROMOTE_REF}' to a commit SHA" >&2
                      exit 1
                  fi
                  echo "Promoting ${PROMOTE_REF} -> ${commit}"
                  echo "commit=$commit" >> "$GITHUB_OUTPUT"

            - name: Login to GitHub Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Production must be the whole stack at one commit. If any app
            # image is missing for this commit, abort instead of promoting a
            # partial set (which would leave services on mixed versions).
            - name: Require a complete image set for this commit
              env:
                  PROMOTE_COMMIT: ${{ steps.commit.outputs.commit }}
              run: |
                  set -euo pipefail
                  missing=()
                  for app in api ui workflows; do
                      if ! docker buildx imagetools inspect "${IMAGE_PREFIX}/${app}:sha-${PROMOTE_COMMIT}" >/dev/null 2>&1; then
                          missing+=("$app")
                      fi
                  done
                  if [ "${#missing[@]}" -ne 0 ]; then
                      echo "Missing sha-${PROMOTE_COMMIT} images for: ${missing[*]}" >&2
                      echo "Every main commit since the build-all change has a full image set — pick one of those." >&2
                      exit 1
                  fi
                  echo "All app images exist for sha-${PROMOTE_COMMIT}"

    promote:
        needs: resolve-images
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        permissions:
            contents: read
            packages: write
        steps:
            - name: Login to GitHub Container Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

            # The stack deploys the immutable sha-<commit> tag. These extra
            # tags are aliases for humans and audit: `production` marks what
            # is live, `prod-<commit>` records every promotion in GHCR.
            - name: Tag the promoted images
              env:
                  PROMOTE_COMMIT: ${{ needs.resolve-images.outputs.commit }}
              run: |
                  set -euo pipefail
                  for app in api ui workflows; do
                      source_ref="${IMAGE_PREFIX}/${app}:sha-${PROMOTE_COMMIT}"
                      digest="$(docker buildx imagetools inspect "$source_ref" | awk '/^Digest:/{print $2; exit}')"
                      if [ -z "$digest" ]; then
                          echo "Unable to resolve digest for $source_ref" >&2
                          exit 1
                      fi
                      echo "Tagging ${app}@${digest} as production and prod-${PROMOTE_COMMIT}"
                      docker buildx imagetools create \
                          --tag "${IMAGE_PREFIX}/${app}:prod-${PROMOTE_COMMIT}" \
                          --tag "${IMAGE_PREFIX}/${app}:production" \
                          "${IMAGE_PREFIX}/${app}@${digest}"
                  done

    deploy-production:
        name: deploy-production
        needs: [resolve-images, promote]
        runs-on: ubuntu-24.04
        timeout-minutes: 20
        environment:
            name: production
            url: https://logid.xyz
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Pin production to this commit and deploy via Komodo
              env:
                  KOMODO_URL: https://komodo.logid.xyz
                  KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
                  KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
                  VARIABLE_NAME: PRODUCTION_IMAGE_TAG
                  IMAGE_TAG: sha-${{ needs.resolve-images.outputs.commit }}
                  STACK_NAME: reputo-apps-production
              run: ./.github/scripts/komodo-deploy.sh

            - name: Verify the deployed commit
              env:
                  BASE_URL: https://logid.xyz
                  EXPECTED_SHA: ${{ needs.resolve-images.outputs.commit }}
              run: ./.github/scripts/verify-deploy.sh
