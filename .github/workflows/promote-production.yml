name: Promote to Production
run-name: Promote ${{ inputs.ref }} to production

on:
    workflow_dispatch:
        inputs:
            ref:
                description: 'Commit SHA or release tag (e.g. v1.4.2) to promote to production'
                required: true
                type: string


concurrency:
    group: promote-production
    cancel-in-progress: false

permissions:
    contents: read

env:
    IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
    resolve-and-promote:
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        permissions:
            contents: read
            packages: write
        outputs:
            commit: ${{ steps.commit.outputs.commit }}
        steps:
            - id: commit
              name: Resolve ref to a commit on main
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PROMOTE_REF: ${{ inputs.ref }}
              run: |
                  set -euo pipefail
                  commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${PROMOTE_REF}" --jq .sha)"
                  if ! [[ "$commit" =~ ^[0-9a-f]{40}$ ]]; then
                      echo "Could not resolve '${PROMOTE_REF}' to a commit SHA" >&2
                      exit 1
                  fi

                  # Only commits that merged to main may reach production.
                  # Preview builds push sha-<commit> images for unmerged PR
                  # code too, so image existence alone is not enough.
                  status="$(gh api "repos/${GITHUB_REPOSITORY}/compare/main...${commit}" --jq .status)"
                  if [ "$status" != "identical" ] && [ "$status" != "behind" ]; then
                      echo "Commit ${commit} is not on main (compare status: ${status})." >&2
                      echo "Only commits that merged to main can be promoted to production." >&2
                      exit 1
                  fi

                  echo "Promoting ${PROMOTE_REF} -> ${commit}"
                  echo "commit=$commit" >> "$GITHUB_OUTPUT"

            - name: Checkout promoted commit
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  ref: ${{ steps.commit.outputs.commit }}
                  sparse-checkout: apps

            - name: Login to GitHub Container Registry
              uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0


            - name: Verify the full image set and tag the promotion
              env:
                  PROMOTE_COMMIT: ${{ steps.commit.outputs.commit }}
              run: |
                  set -euo pipefail
                  shopt -s nullglob

                  apps=()
                  for dockerfile in apps/*/Dockerfile; do
                      apps+=("$(basename "$(dirname "$dockerfile")")")
                  done
                  if [ "${#apps[@]}" -eq 0 ]; then
                      echo "No apps/*/Dockerfile found at ${PROMOTE_COMMIT}" >&2
                      exit 1
                  fi

                  declare -A digests
                  missing=()
                  for app in "${apps[@]}"; do
                      source_ref="${IMAGE_PREFIX}/${app}:sha-${PROMOTE_COMMIT}"
                      if ! digest="$(docker buildx imagetools inspect "$source_ref" 2>/dev/null \
                          | awk '/^Digest:/{print $2; exit}')" || [ -z "$digest" ]; then
                          missing+=("$app")
                          continue
                      fi
                      digests["$app"]="$digest"
                  done

                  if [ "${#missing[@]}" -ne 0 ]; then
                      echo "Missing sha-${PROMOTE_COMMIT} images for: ${missing[*]}" >&2
                      echo "Every main commit has a full image set — pick a commit from main." >&2
                      exit 1
                  fi

                  for app in "${apps[@]}"; do
                      digest="${digests[$app]}"
                      echo "Tagging ${app}@${digest} as production and prod-${PROMOTE_COMMIT}"
                      docker buildx imagetools create \
                          --tag "${IMAGE_PREFIX}/${app}:prod-${PROMOTE_COMMIT}" \
                          --tag "${IMAGE_PREFIX}/${app}:production" \
                          "${IMAGE_PREFIX}/${app}@${digest}"
                  done

    deploy-production:
        needs: resolve-and-promote
        uses: ./.github/workflows/_deploy.yml
        with:
            environment: production
            sha: ${{ needs.resolve-and-promote.outputs.commit }}
            base-url: https://logid.xyz
        # inherit, not explicit passing: the Komodo secrets may be scoped to
        # the GitHub `production` environment, which only resolves on the
        # called job that declares the environment.
        secrets: inherit
