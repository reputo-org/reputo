name: Release 📝
run-name: Release 📝


on:
    workflow_call:


env:
    RUNNER: ubuntu-22.04

jobs:
    release:
        name: Release
        runs-on: ${{ env.RUNNER }}
        permissions:
          contents: write
          issues: write
          pull-requests: write
          id-token: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: pnpm exec semantic-release
