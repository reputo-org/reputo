name: Pull Preview 👀
run-name: Pull Preview 👀

on:
    pull_request:
        branches: [main]
        types: [opened, reopened, synchronize, labeled, unlabeled, closed]
    schedule:
        - cron: '0 * * * *'

concurrency: preview-${{ github.event.pull_request.number || github.ref }}

jobs:
    build:
        if: |
            github.event_name == 'pull_request' &&
            github.event.action != 'closed' &&
            github.event.action != 'unlabeled' &&
            contains(github.event.pull_request.labels.*.name, 'pullpreview')
        uses: ./.github/workflows/_build-and-push.yml
        with:
            ref: ${{ github.event.pull_request.head.sha }}
            push: true
            affected: false
            tags: |
                type=raw,value=preview-${{ github.event.pull_request.head.sha }}

    preview:
        name: preview
        needs: build
        permissions:
            contents: read
            pull-requests: write
            statuses: write

        if: |
            !cancelled() &&
            (needs.build.result == 'success' || needs.build.result == 'skipped') &&
            (github.event_name == 'schedule' ||
             github.event.action == 'closed' ||
             github.event.label.name == 'pullpreview' ||
             contains(github.event.pull_request.labels.*.name, 'pullpreview'))
        runs-on: ubuntu-22.04
        timeout-minutes: 30
        environment:
            name: preview
            url: ${{ steps.preview.outputs.url }}
        steps:
            - uses: actions/checkout@v4

            - name: Generate per-deploy auth token encryption key
              if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.action != 'unlabeled'
              id: gen_auth_key
              run: |
                  key="$(node -e "process.stdout.write(require('node:crypto').randomBytes(32).toString('hex'))")"
                  echo "::add-mask::$key"
                  echo "auth_token_encryption_key=$key" >> "$GITHUB_OUTPUT"

            - id: preview
              name: Deploy preview
              uses: pullpreview/action@v6.2.0
              with:
                  label: pullpreview
                  provider: lightsail
                  instance_type: large
                  region: eu-central-1
                  compose_files: infra/preview/compose.yml
                  compose_options: ''
                  proxy_tls: traefik:80
                  ttl: 24h
              env:
                  AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID }}'
                  AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
                  AWS_REGION: 'eu-central-1'

                  IMAGE_TAG: 'preview-${{ github.event.pull_request.head.sha }}'
                  AUTH_TOKEN_ENCRYPTION_KEY: '${{ steps.gen_auth_key.outputs.auth_token_encryption_key }}'
                  DEEPFUNDING_API_KEY: '${{ secrets.DEEPFUNDING_API_KEY }}'
                  ALCHEMY_API_KEY: '${{ secrets.ALCHEMY_API_KEY }}'
                  BLOCKFROST_API_KEY: '${{ secrets.BLOCKFROST_API_KEY }}'
