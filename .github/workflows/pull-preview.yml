name: Pull Preview 👀
run-name: Pull Preview 👀
on:
    pull_request:
        branches: [main]
        types: [labeled, unlabeled, synchronize, reopened, opened, closed]

concurrency: ${{ github.ref }}

jobs:
    build:
        if: |
            github.event.action != 'closed' &&
            github.event.action != 'unlabeled' &&
            contains(github.event.pull_request.labels.*.name, 'pullpreview')
        uses: ./.github/workflows/_build-and-push.yml
        with:
            ref: ${{ github.event.pull_request.head.sha }}
            push: true
            # Preview compose references every image by tag, so always build
            # all apps here regardless of which were affected.
            affected: false
            tags: |
                type=raw,value=preview-${{ github.event.pull_request.head.sha }}

    deploy:
        name: deploy
        needs: build
        if: |
            !cancelled() &&
            (needs.build.result == 'success' || needs.build.result == 'skipped') &&
            (github.event.label.name == 'pullpreview' ||
             contains(github.event.pull_request.labels.*.name, 'pullpreview'))
        runs-on: ubuntu-22.04
        timeout-minutes: 30
        permissions:
            contents: read
            deployments: write
            pull-requests: write
            statuses: write
        environment:
            name: preview
            url: ${{ steps.preview_result.outputs.url }}
        steps:
            - uses: actions/checkout@v4

            - name: Generate per-deploy auth token encryption key
              if: github.event.action != 'closed' && github.event.action != 'unlabeled'
              id: gen_auth_key
              run: |
                  key="$(node -e "process.stdout.write(require('node:crypto').randomBytes(32).toString('hex'))")"
                  echo "::add-mask::$key"
                  echo "auth_token_encryption_key=$key" >> "$GITHUB_OUTPUT"

            - id: pullpreview_primary
              name: Deploy preview
              continue-on-error: true
              uses: pullpreview/action@v6
              with:
                  label: pullpreview
                  provider: lightsail
                  instance_type: large
                  compose_files: docker/compose/compose.preview.yml
                  compose_options: ''
                  ttl: 24h
              env:
                  # AWS creds for the Lightsail provisioner (not the app).
                  AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID }}'
                  AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
                  AWS_REGION: 'eu-central-1'

                  # Per-deploy values consumed by compose.preview.yml.
                  IMAGE_TAG: 'preview-${{ github.event.pull_request.head.sha }}'
                  AUTH_TOKEN_ENCRYPTION_KEY: '${{ steps.gen_auth_key.outputs.auth_token_encryption_key }}'
                  DEEPFUNDING_API_KEY: '${{ secrets.DEEPFUNDING_API_KEY }}'
                  ALCHEMY_API_KEY: '${{ secrets.ALCHEMY_API_KEY }}'
                  BLOCKFROST_API_KEY: '${{ secrets.BLOCKFROST_API_KEY }}'

            - id: pullpreview_retry
              name: Retry preview deploy after transient failure
              if: steps.pullpreview_primary.outcome == 'failure'
              uses: pullpreview/action@v6
              with:
                  label: pullpreview
                  provider: lightsail
                  instance_type: large
                  compose_files: docker/compose/compose.preview.yml
                  compose_options: ''
                  ttl: 24h
              env:
                  AWS_ACCESS_KEY_ID: '${{ secrets.AWS_ACCESS_KEY_ID }}'
                  AWS_SECRET_ACCESS_KEY: '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
                  AWS_REGION: 'eu-central-1'

                  IMAGE_TAG: 'preview-${{ github.event.pull_request.head.sha }}'
                  AUTH_TOKEN_ENCRYPTION_KEY: '${{ steps.gen_auth_key.outputs.auth_token_encryption_key }}'
                  DEEPFUNDING_API_KEY: '${{ secrets.DEEPFUNDING_API_KEY }}'
                  ALCHEMY_API_KEY: '${{ secrets.ALCHEMY_API_KEY }}'
                  BLOCKFROST_API_KEY: '${{ secrets.BLOCKFROST_API_KEY }}'

            - id: preview_result
              if: always()
              name: Resolve preview URL
              run: |
                  if [ "${{ steps.pullpreview_primary.outcome }}" = 'success' ]; then
                      echo "url=${{ steps.pullpreview_primary.outputs.url }}" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  if [ "${{ steps.pullpreview_retry.outcome }}" = 'success' ]; then
                      echo "url=${{ steps.pullpreview_retry.outputs.url }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Fail if preview deployment did not succeed
              if: steps.pullpreview_primary.outcome != 'success' && steps.pullpreview_retry.outcome != 'success'
              run: exit 1
