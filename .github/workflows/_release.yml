name: Release

on:
    workflow_call:
        outputs:
            version:
                description: Release tag created by semantic-release for this commit (empty if none)
                value: ${{ jobs.release.outputs.version }}

permissions:
    contents: read

jobs:
    release:
        runs-on: ubuntu-24.04
        timeout-minutes: 15
        permissions:
            contents: write
            issues: write
            pull-requests: write
        outputs:
            # only when a release is actually published — empty otherwise.
            version: ${{ steps.semantic.outputs.version }}
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0

            - name: Setup toolchain
              uses: ./.github/actions/setup

            - id: semantic
              name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: pnpm exec semantic-release
