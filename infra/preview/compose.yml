# Compose for PullPreview per-PR previews on AWS Lightsail (pullpreview/action@v6.2).
################################################################################
# Cross-cutting defaults
################################################################################

x-logging: &logging
    driver: json-file
    options:
        max-size: '10m'
        max-file: '5'

x-service-defaults: &service-defaults
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *logging
    networks: [default]
    security_opt:
        - no-new-privileges:true

x-resources-xs: &resources-xs
    limits:
        memory: 64M
        cpus: '0.25'
    reservations:
        memory: 32M

x-resources-s: &resources-s
    limits:
        memory: 128M
        cpus: '0.50'
    reservations:
        memory: 64M

x-resources-m: &resources-m
    limits:
        memory: 256M
        cpus: '1.00'
    reservations:
        memory: 128M

x-resources-l: &resources-l
    limits:
        memory: 384M
        cpus: '1.50'
    reservations:
        memory: 192M

x-pg-healthcheck: &pg-healthcheck
    test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 20s

x-node-tcp-healthcheck: &node-tcp-healthcheck
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 30s

################################################################################

x-api-environment: &api-environment
    NODE_ENV: development
    PORT: '3000'
    LOG_LEVEL: info
    AUTH_MODE: mock
    OWNER_EMAIL: preview@example.com
    APP_PUBLIC_URL: '${PULLPREVIEW_URL:?missing PULLPREVIEW_URL}'
    DEEP_ID_ISSUER_URL: https://mock.invalid
    DEEP_ID_CLIENT_ID: mock-client-id
    DEEP_ID_CLIENT_SECRET: mock-client-secret
    DEEP_ID_AUTH_REDIRECT_URI: https://mock.invalid/api/v1/auth/deep-id/callback
    DEEP_ID_AUTH_SCOPES: openid profile email offline_access
    DEEP_ID_CONSENT_REDIRECT_URI: https://mock.invalid/api/v1/oauth/consent/deep-id/callback
    DEEP_ID_CONSENT_GRANT_TTL_SECONDS: '600'
    VOTING_PORTAL_RETURN_URL: https://mock.invalid/voting
    DEEP_ID_VOTING_PORTAL_SCOPES: api wallets
    AUTH_COOKIE_NAME: reputo_auth_session
    AUTH_COOKIE_SECURE: 'true'
    AUTH_COOKIE_SAME_SITE: lax
    AUTH_TOKEN_ENCRYPTION_KEY: '${AUTH_TOKEN_ENCRYPTION_KEY:?missing AUTH_TOKEN_ENCRYPTION_KEY}'
    DATABASE_URL: postgresql://reputo_app:reputo_app@postgres:5432/reputo_preview
    AWS_REGION: us-east-1
    AWS_ACCESS_KEY_ID: minio
    AWS_SECRET_ACCESS_KEY: minio12345preview
    STORAGE_BUCKET: reputo-preview
    STORAGE_ENDPOINT: http://minio:9000
    STORAGE_FORCE_PATH_STYLE: 'true'
    STORAGE_PRESIGN_PUT_TTL: '120'
    STORAGE_PRESIGN_GET_TTL: '300'
    STORAGE_MAX_SIZE_BYTES: '52428800'
    STORAGE_CONTENT_TYPE_ALLOWLIST: text/csv,text/plain,application/json,application/x-sqlite3
    TEMPORAL_ADDRESS: temporal:7233
    TEMPORAL_NAMESPACE: default
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE: orchestrator-worker
    TEMPORAL_API_SNAPSHOT_ACTIVITIES_TASK_QUEUE: api-snapshot-activities

x-workflows-environment: &workflows-environment
    NODE_ENV: development
    LOG_LEVEL: info
    TEMPORAL_ADDRESS: temporal:7233
    TEMPORAL_NAMESPACE: default
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE: orchestrator-worker
    TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE: algorithm-typescript-worker
    TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE: algorithm-python-worker
    TEMPORAL_ONCHAIN_DATA_TASK_QUEUE: onchain-data-worker
    AWS_REGION: us-east-1
    AWS_ACCESS_KEY_ID: minio
    AWS_SECRET_ACCESS_KEY: minio12345preview
    STORAGE_BUCKET: reputo-preview
    STORAGE_ENDPOINT: http://minio:9000
    STORAGE_FORCE_PATH_STYLE: 'true'
    STORAGE_PRESIGN_PUT_TTL: '120'
    STORAGE_PRESIGN_GET_TTL: '300'
    STORAGE_MAX_SIZE_BYTES: '52428800'
    DEEPFUNDING_API_BASE_URL: https://deep-projects.ai/wp-json/deepfunding/v1
    DEEPFUNDING_API_KEY: '${DEEPFUNDING_API_KEY:?missing DEEPFUNDING_API_KEY}'
    ALCHEMY_API_KEY: '${ALCHEMY_API_KEY:?missing ALCHEMY_API_KEY}'
    ONCHAIN_DATABASE_URL: postgresql://reputo_onchain:reputo_onchain@onchain-data-postgresql:5432/reputo_onchain
    BLOCKFROST_API_KEY: '${BLOCKFROST_API_KEY:?missing BLOCKFROST_API_KEY}'

################################################################################
# Networks / volumes
################################################################################

networks:
    default:
        name: reputo
        driver: bridge

volumes:
    postgres_data:
        driver: local
    onchain_data_postgresql_data:
        driver: local
    temporal_postgresql_data:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    minio_data:
        driver: local

services:
    traefik:
        <<: *service-defaults
        container_name: traefik
        image: traefik:v3.6
        volumes:
            - ./traefik.yml:/etc/traefik/traefik.yml:ro
            - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
        healthcheck:
            test:
                - CMD
                - traefik
                - healthcheck
                - --ping=true
                - --ping.entrypoint=web
                - --entrypoints.web.address=:80
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        deploy:
            resources: *resources-s

    ############################################################################
    # Datastores
    ############################################################################

    postgres:
        <<: *service-defaults
        container_name: postgres
        image: postgres:16
        environment:
            POSTGRES_USER: reputo_app
            POSTGRES_PASSWORD: reputo_app
            POSTGRES_DB: reputo_preview
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck: *pg-healthcheck
        deploy:
            resources: *resources-l

    onchain-data-postgresql:
        <<: *service-defaults
        container_name: onchain-data-postgresql
        image: postgres:16
        environment:
            POSTGRES_USER: reputo_onchain
            POSTGRES_PASSWORD: reputo_onchain
            POSTGRES_DB: reputo_onchain
        volumes:
            - onchain_data_postgresql_data:/var/lib/postgresql/data
        healthcheck: *pg-healthcheck
        deploy:
            resources: *resources-m

    ############################################################################
    # Temporal stack
    ############################################################################

    temporal:
        <<: *service-defaults
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        environment:
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            ENABLE_ES: 'true'
            ES_SEEDS: temporal-elasticsearch
            ES_VERSION: v7
        healthcheck:
            test:
                - CMD-SHELL
                - 'temporal operator cluster health --address $$(hostname -i):7233'
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s
        deploy:
            resources: *resources-m

    temporal-elasticsearch:
        <<: *service-defaults
        container_name: temporal-elasticsearch
        image: elasticsearch:7.17.23
        environment:
            cluster.routing.allocation.disk.threshold_enabled: 'true'
            cluster.routing.allocation.disk.watermark.low: 512mb
            cluster.routing.allocation.disk.watermark.high: 256mb
            cluster.routing.allocation.disk.watermark.flood_stage: 128mb
            discovery.type: single-node
            ES_JAVA_OPTS: '-Xms256m -Xmx256m'
            xpack.security.enabled: 'false'
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        deploy:
            resources: *resources-l

    temporal-postgresql:
        <<: *service-defaults
        container_name: temporal-postgresql
        image: postgres:12.22
        environment:
            POSTGRES_USER: temporal
            POSTGRES_PASSWORD: temporal
        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data
        deploy:
            resources: *resources-s

    ############################################################################
    # Object storage — in-stack MinIO (preview's S3 stand-in)
    ############################################################################

    minio:
        <<: *service-defaults
        container_name: minio
        image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
        command: server --console-address ":9001" /data
        environment:
            MINIO_ROOT_USER: minio
            MINIO_ROOT_PASSWORD: minio12345preview
        volumes:
            - minio_data:/data
        healthcheck:
            test:
                - CMD-SHELL
                - 'curl -fsS http://localhost:9000/minio/health/live || exit 1'
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 15s
        deploy:
            resources: *resources-m

    minio-init:
        <<: *service-defaults
        container_name: minio-init
        image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
        restart: 'no'
        depends_on:
            minio:
                condition: service_healthy
        entrypoint:
            - /bin/sh
            - -lc
            - |
                set -eu
                mc alias set local http://minio:9000 minio minio12345preview
                mc mb --ignore-existing local/reputo-preview
        deploy:
            resources: *resources-xs

    ############################################################################
    # Apps — same prebuilt images as staging/prod, pulled by preview-<sha> tag
    ############################################################################

    ui:
        <<: *service-defaults
        container_name: ui
        image: ghcr.io/reputo-org/reputo/ui:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        environment:
            PORT: '8080'
            HOSTNAME: 0.0.0.0
        healthcheck:
            <<: *node-tcp-healthcheck
            test:
                - CMD-SHELL
                - >-
                    node -e "require('net').connect(8080).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
        deploy:
            resources: *resources-s

    api:
        <<: *service-defaults
        container_name: api
        image: ghcr.io/reputo-org/reputo/api:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        depends_on:
            postgres:
                condition: service_healthy
            minio-init:
                condition: service_completed_successfully
        environment: *api-environment
        healthcheck:
            <<: *node-tcp-healthcheck
            test:
                - CMD-SHELL
                - >-
                    node -e "require('net').connect(3000).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
        deploy:
            resources: *resources-l

    orchestrator-worker:
        <<: *service-defaults
        container_name: orchestrator-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        depends_on:
            temporal:
                condition: service_healthy
            minio-init:
                condition: service_completed_successfully
        command: ['pnpm', 'start:orchestrator']
        environment: *workflows-environment
        deploy:
            resources: *resources-m

    onchain-data-worker:
        <<: *service-defaults
        container_name: onchain-data-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        depends_on:
            temporal:
                condition: service_healthy
            onchain-data-postgresql:
                condition: service_healthy
            minio-init:
                condition: service_completed_successfully
        command: ['pnpm', 'start:onchain-data']
        environment: *workflows-environment
        deploy:
            resources: *resources-m

    typescript-worker:
        <<: *service-defaults
        container_name: typescript-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        depends_on:
            temporal:
                condition: service_healthy
            minio-init:
                condition: service_completed_successfully
        command: ['pnpm', 'start:algorithm-typescript']
        environment: *workflows-environment
        deploy:
            resources: *resources-m
