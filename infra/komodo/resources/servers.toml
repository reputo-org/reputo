[[server]]
name = "staging"
description = "Reputo staging host running the Komodo Periphery agent."
tags = ["reputo", "env:staging"]

[server.config]
address = ""
region = "staging"
enabled = true
stats_monitoring = true
auto_prune = false
send_unreachable_alerts = true
send_cpu_alerts = true
send_mem_alerts = true
send_disk_alerts = true
send_version_mismatch_alerts = true
cpu_warning = 80.0
cpu_critical = 95.0
mem_warning = 80.0
mem_critical = 95.0
disk_warning = 80.0
disk_critical = 90.0

[[server]]
name = "production"
description = "Reputo production host running the Komodo Periphery agent."
tags = ["reputo", "env:production"]

[server.config]
address = ""
region = "production"
enabled = true
stats_monitoring = true
auto_prune = false
send_unreachable_alerts = true
send_cpu_alerts = true
send_mem_alerts = true
send_disk_alerts = true
send_version_mismatch_alerts = true
cpu_warning = 80.0
cpu_critical = 95.0
mem_warning = 80.0
mem_critical = 95.0
disk_warning = 80.0
disk_critical = 90.0

# The Komodo Core VM's self-Periphery runs in passive WebSocket mode and is
# auto-registered by Core as the server named "komodo-core" via
# KOMODO_FIRST_SERVER_NAME in core.env. Do not declare it here.
