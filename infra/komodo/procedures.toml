# Procedures, grouped by family:
#   deploy-database-*       Deploy the database stack on one environment.
#   deploy-temporal-*       Deploy the temporal stack.
#   deploy-observability-*  Deploy the observability stack.
#   deploy-apps-*           Deploy the apps stack.
#   deploy-infra-*          Sequence: database -> temporal -> observability.
#   deploy-all-*            Sequence: database -> temporal -> observability -> apps.
#   restart-apps-*          Restart the apps stack (no pull/recreate volumes).
#   backup-data-*           One-shot postgres-backup service in the database stack.
#   promote-production      Production app deploy after GHA digest retag.
#   prune-images            Daily image prune on staging and production.

################################################################################
# deploy-database
################################################################################

[[procedure]]
name = "deploy-database-staging"
description = "Deploy the staging database stack (API + onchain Postgres)."
tags = ["reputo", "env:staging", "deploy"]

[procedure.config]
schedule = ""
schedule_enabled = false
schedule_alert = false
failure_alert = true
webhook_enabled = false

[[procedure.config.stage]]
name = "Deploy reputo-database-staging"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "reputo-database-staging", execution.params.services = [], enabled = true },
]

[[procedure]]
name = "deploy-database-production"
description = "Deploy the production database stack (API + onchain Postgres)."
tags = ["reputo", "env:production", "deploy"]

[procedure.config]
schedule = ""
schedule_enabled = false
schedule_alert = false
failure_alert = true
webhook_enabled = false

[[procedure.config.stage]]
name = "Deploy reputo-database-production"
enabled = true
executions = [
  { execution.type = "DeployStack", execution.params.stack = "reputo-database-production", execution.params.services = [], enabled = true },
]

