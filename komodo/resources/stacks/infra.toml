[[stack]]
name = "reputo-infra-staging"
description = "Staging infrastructure stack: MongoDB, Traefik, Temporal, Postgres, and observability."
tags = ["reputo", "env:staging", "infra"]
deploy = false

[stack.config]
server_id = "staging"
project_name = "reputo"
git_provider = "github.com"
git_https = true
repo = "reputo-org/reputo"
branch = "main"
files_on_host = false
file_paths = [
  "docker/compose/infra.yml",
  "docker/compose/observability.yml",
]
env_file_path = ".komodo-reputo-infra-staging.env"
environment = """
TRAEFIK_DOMAIN=[[STAGING_TRAEFIK_DOMAIN]]
TEMPORAL_UI_DOMAIN=[[STAGING_TEMPORAL_UI_DOMAIN]]
TRAEFIK_AUTH=[[STAGING_TRAEFIK_AUTH]]
CF_DNS_API_TOKEN=[[STAGING_CF_DNS_API_TOKEN]]
GRAFANA_DOMAIN=[[STAGING_GRAFANA_DOMAIN]]
GRAFANA_AUTH=[[STAGING_GRAFANA_AUTH]]
OBSERVABILITY_ENV=staging
ALLOWED_ORIGINS=[[STAGING_ALLOWED_ORIGINS]]
MONGO_INITDB_ROOT_USERNAME=[[STAGING_MONGODB_USER]]
MONGO_INITDB_ROOT_PASSWORD=[[STAGING_MONGODB_PASSWORD]]
MONGODB_DB_NAME=[[STAGING_MONGODB_DB_NAME]]
TEMPORAL_POSTGRES_USER=[[STAGING_TEMPORAL_POSTGRES_USER]]
TEMPORAL_POSTGRES_PASSWORD=[[STAGING_TEMPORAL_POSTGRES_PASSWORD]]
ONCHAIN_DATA_POSTGRES_USER=[[STAGING_ONCHAIN_DATA_POSTGRES_USER]]
ONCHAIN_DATA_POSTGRES_PASSWORD=[[STAGING_ONCHAIN_DATA_POSTGRES_PASSWORD]]
ONCHAIN_DATA_POSTGRES_DB_NAME=[[STAGING_ONCHAIN_DATA_POSTGRES_DB_NAME]]
API_POSTGRES_USER=[[STAGING_API_POSTGRES_USER]]
API_POSTGRES_PASSWORD=[[STAGING_API_POSTGRES_PASSWORD]]
API_POSTGRES_DB_NAME=[[STAGING_API_POSTGRES_DB_NAME]]
GRAFANA_ADMIN_USER=[[STAGING_GRAFANA_ADMIN_USER]]
GRAFANA_ADMIN_PASSWORD=[[STAGING_GRAFANA_ADMIN_PASSWORD]]
"""
auto_pull = false
run_build = false
poll_for_updates = false
auto_update = false
auto_update_all_services = false
destroy_before_deploy = false
send_alerts = true
webhook_enabled = false
webhook_force_deploy = false
webhook_secret = "[[KOMODO_WEBHOOK_SECRET]]"

