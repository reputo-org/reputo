[[stack]]
name = "reputo-infra-staging"
description = "Staging infrastructure stack: Traefik, Temporal, Postgres, and observability."
tags = ["reputo", "env:staging", "infra"]
deploy = false

[stack.config]
server_id = "staging"
project_name = "reputo"
git_provider = "github.com"
git_https = true
repo = "reputo-org/reputo"
branch = "main"
files_on_host = false
file_paths = ["docker/compose/compose.yml"]
env_file_path = ".komodo-reputo-infra-staging.env"
environment = """
COMPOSE_PROFILES=infra,observability
COMPOSE_NETWORK_NAME=production
API_POSTGRES_HOST_BIND=0.0.0.0
ONCHAIN_DATA_POSTGRES_HOST_BIND=0.0.0.0
TRAEFIK_DOMAIN=[[STAGING_TRAEFIK_DOMAIN]]
TEMPORAL_UI_DOMAIN=[[STAGING_TEMPORAL_UI_DOMAIN]]
TRAEFIK_AUTH=[[STAGING_TRAEFIK_AUTH]]
CF_DNS_API_TOKEN=[[STAGING_CF_DNS_API_TOKEN]]
GRAFANA_DOMAIN=[[STAGING_GRAFANA_DOMAIN]]
GRAFANA_AUTH=[[STAGING_GRAFANA_AUTH]]
OBSERVABILITY_ENV=staging
ALLOWED_ORIGINS=[[STAGING_ALLOWED_ORIGINS]]
TEMPORAL_POSTGRES_USER=[[STAGING_TEMPORAL_POSTGRES_USER]]
TEMPORAL_POSTGRES_PASSWORD=[[STAGING_TEMPORAL_POSTGRES_PASSWORD]]
ONCHAIN_DATA_POSTGRES_USER=[[STAGING_ONCHAIN_DATA_POSTGRES_USER]]
ONCHAIN_DATA_POSTGRES_PASSWORD=[[STAGING_ONCHAIN_DATA_POSTGRES_PASSWORD]]
ONCHAIN_DATA_POSTGRES_DB_NAME=[[STAGING_ONCHAIN_DATA_POSTGRES_DB_NAME]]
API_POSTGRES_USER=[[STAGING_API_POSTGRES_USER]]
API_POSTGRES_PASSWORD=[[STAGING_API_POSTGRES_PASSWORD]]
API_POSTGRES_DB_NAME=[[STAGING_API_POSTGRES_DB_NAME]]
GRAFANA_ADMIN_USER=[[STAGING_GRAFANA_ADMIN_USER]]
GRAFANA_ADMIN_PASSWORD=[[STAGING_GRAFANA_ADMIN_PASSWORD]]
"""
auto_pull = false
run_build = false
poll_for_updates = false
auto_update = false
auto_update_all_services = false
destroy_before_deploy = false
send_alerts = true
webhook_enabled = false
webhook_force_deploy = false
webhook_secret = "[[KOMODO_WEBHOOK_SECRET]]"

[[stack]]
name = "reputo-infra-production"
description = "Production infrastructure stack: Traefik, Temporal, Postgres, and observability."
tags = ["reputo", "env:production", "infra"]
deploy = false

[stack.config]
server_id = "production"
project_name = "reputo"
git_provider = "github.com"
git_https = true
repo = "reputo-org/reputo"
branch = "main"
files_on_host = false
file_paths = ["docker/compose/compose.yml"]
env_file_path = ".komodo-reputo-infra-production.env"
environment = """
COMPOSE_PROFILES=infra,observability
COMPOSE_NETWORK_NAME=production
# Preserve pre-refactor behavior: postgres host ports bound to all interfaces
# (today's shorthand `5434:5432` and `5433:5432` mappings). Switch to
# `127.0.0.1` once external DB clients are confirmed unused.
API_POSTGRES_HOST_BIND=0.0.0.0
ONCHAIN_DATA_POSTGRES_HOST_BIND=0.0.0.0
TRAEFIK_DOMAIN=[[PRODUCTION_TRAEFIK_DOMAIN]]
TEMPORAL_UI_DOMAIN=[[PRODUCTION_TEMPORAL_UI_DOMAIN]]
TRAEFIK_AUTH=[[PRODUCTION_TRAEFIK_AUTH]]
CF_DNS_API_TOKEN=[[PRODUCTION_CF_DNS_API_TOKEN]]
GRAFANA_DOMAIN=[[PRODUCTION_GRAFANA_DOMAIN]]
GRAFANA_AUTH=[[PRODUCTION_GRAFANA_AUTH]]
OBSERVABILITY_ENV=production
ALLOWED_ORIGINS=[[PRODUCTION_ALLOWED_ORIGINS]]
TEMPORAL_POSTGRES_USER=[[PRODUCTION_TEMPORAL_POSTGRES_USER]]
TEMPORAL_POSTGRES_PASSWORD=[[PRODUCTION_TEMPORAL_POSTGRES_PASSWORD]]
ONCHAIN_DATA_POSTGRES_USER=[[PRODUCTION_ONCHAIN_DATA_POSTGRES_USER]]
ONCHAIN_DATA_POSTGRES_PASSWORD=[[PRODUCTION_ONCHAIN_DATA_POSTGRES_PASSWORD]]
ONCHAIN_DATA_POSTGRES_DB_NAME=[[PRODUCTION_ONCHAIN_DATA_POSTGRES_DB_NAME]]
API_POSTGRES_USER=[[PRODUCTION_API_POSTGRES_USER]]
API_POSTGRES_PASSWORD=[[PRODUCTION_API_POSTGRES_PASSWORD]]
API_POSTGRES_DB_NAME=[[PRODUCTION_API_POSTGRES_DB_NAME]]
GRAFANA_ADMIN_USER=[[PRODUCTION_GRAFANA_ADMIN_USER]]
GRAFANA_ADMIN_PASSWORD=[[PRODUCTION_GRAFANA_ADMIN_PASSWORD]]
"""
auto_pull = false
run_build = false
poll_for_updates = false
auto_update = false
auto_update_all_services = false
destroy_before_deploy = false
send_alerts = true
webhook_enabled = false
webhook_force_deploy = false
webhook_secret = "[[KOMODO_WEBHOOK_SECRET]]"
