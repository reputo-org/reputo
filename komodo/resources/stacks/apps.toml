[[stack]]
name = "reputo-apps-staging"
description = "Staging application stack: API, UI, and workflow workers."
tags = ["reputo", "env:staging", "apps"]
deploy = false

[stack.config]
server_id = "staging"
project_name = "reputo"
git_provider = "github.com"
git_https = true
repo = "reputo-org/reputo"
branch = "main"
files_on_host = false
file_paths = ["docker/compose/apps.yml"]
env_file_path = ".komodo-reputo-apps-staging.env"
environment = """
IMAGE_TAG=staging
UI_DOMAIN=[[STAGING_UI_DOMAIN]]
API_DOMAIN=[[STAGING_API_DOMAIN]]
ALLOWED_ORIGINS=[[STAGING_ALLOWED_ORIGINS]]
NODE_ENV=production
LOG_LEVEL=info
AUTH_MODE=oauth
# OWNER_EMAIL is required for AUTH_MODE=oauth; API startup fails if it is missing or conflicts with an active owner.
OWNER_EMAIL=[[STAGING_OWNER_EMAIL]]
APP_PUBLIC_URL=[[STAGING_APP_PUBLIC_URL]]
MONGODB_DB_NAME=[[STAGING_MONGODB_DB_NAME]]
MONGODB_USER=[[STAGING_MONGODB_USER]]
MONGODB_PASSWORD=[[STAGING_MONGODB_PASSWORD]]
DEEP_ID_ISSUER_URL=[[STAGING_DEEP_ID_ISSUER_URL]]
DEEP_ID_CLIENT_ID=[[STAGING_DEEP_ID_CLIENT_ID]]
DEEP_ID_CLIENT_SECRET=[[STAGING_DEEP_ID_CLIENT_SECRET]]
DEEP_ID_AUTH_REDIRECT_URI=[[STAGING_DEEP_ID_AUTH_REDIRECT_URI]]
DEEP_ID_AUTH_SCOPES=[[STAGING_DEEP_ID_AUTH_SCOPES]]
DEEP_ID_CONSENT_REDIRECT_URI=[[STAGING_DEEP_ID_CONSENT_REDIRECT_URI]]
DEEP_ID_CONSENT_GRANT_TTL_SECONDS=[[STAGING_DEEP_ID_CONSENT_GRANT_TTL_SECONDS]]
VOTING_PORTAL_RETURN_URL=[[STAGING_VOTING_PORTAL_RETURN_URL]]
DEEP_ID_VOTING_PORTAL_SCOPES=[[STAGING_DEEP_ID_VOTING_PORTAL_SCOPES]]
AUTH_COOKIE_NAME=reputo_auth_session
AUTH_COOKIE_DOMAIN=[[STAGING_AUTH_COOKIE_DOMAIN]]
AUTH_COOKIE_SECURE=true
AUTH_COOKIE_SAME_SITE=lax
AUTH_SESSION_TTL_SECONDS=2592000
AUTH_REFRESH_LEEWAY_SECONDS=60
AUTH_TOKEN_ENCRYPTION_KEY=[[STAGING_AUTH_TOKEN_ENCRYPTION_KEY]]
AWS_REGION=[[STAGING_AWS_REGION]]
STORAGE_BUCKET=[[STAGING_STORAGE_BUCKET]]
STORAGE_PRESIGN_PUT_TTL=120
STORAGE_PRESIGN_GET_TTL=300
STORAGE_MAX_SIZE_BYTES=52428800
API_STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,text/plain,application/json
WORKFLOWS_STORAGE_CONTENT_TYPE_ALLOWLIST=text/csv,application/json,application/x-sqlite3
TEMPORAL_ADDRESS=temporal:7233
TEMPORAL_NAMESPACE=default
TEMPORAL_ORCHESTRATOR_TASK_QUEUE=orchestrator-worker
TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE=algorithm-typescript-worker
TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE=algorithm-python-worker
TEMPORAL_ONCHAIN_DATA_TASK_QUEUE=onchain-data-worker
DEEPFUNDING_API_BASE_URL=[[STAGING_DEEPFUNDING_API_BASE_URL]]
DEEPFUNDING_API_KEY=[[STAGING_DEEPFUNDING_API_KEY]]
DEEPFUNDING_API_REQUEST_TIMEOUT_MS=45000
DEEPFUNDING_API_CONCURRENCY=4
DEEPFUNDING_API_DEFAULT_PAGE_LIMIT=500
DEEPFUNDING_API_RETRY_MAX_ATTEMPTS=7
DEEPFUNDING_API_RETRY_BASE_DELAY_MS=500
DEEPFUNDING_API_RETRY_MAX_DELAY_MS=20000
ONCHAIN_DATA_POSTGRES_HOST=onchain-data-postgresql
ONCHAIN_DATA_POSTGRES_PORT=5432
ONCHAIN_DATA_POSTGRES_DB_NAME=[[STAGING_ONCHAIN_DATA_POSTGRES_DB_NAME]]
ONCHAIN_DATA_POSTGRES_USER=[[STAGING_ONCHAIN_DATA_POSTGRES_USER]]
ONCHAIN_DATA_POSTGRES_PASSWORD=[[STAGING_ONCHAIN_DATA_POSTGRES_PASSWORD]]
ALCHEMY_API_KEY=[[STAGING_ALCHEMY_API_KEY]]
BLOCKFROST_API_KEY=[[STAGING_BLOCKFROST_API_KEY]]
"""
auto_pull = true
run_build = false
poll_for_updates = false
auto_update = false
auto_update_all_services = false
destroy_before_deploy = false
send_alerts = true
webhook_enabled = true
webhook_force_deploy = true
webhook_secret = "[[KOMODO_WEBHOOK_SECRET]]"

