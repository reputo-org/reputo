# Compose for staging and production.
#
# Service selection is by profile (set COMPOSE_PROFILES):
#   apps           — api, ui, orchestrator/onchain-data/typescript workers
#   infra          — traefik, postgres, temporal stack
#   observability  — loki, promtail, prometheus, cadvisor, node-exporter, grafana
#
# Per-PR previews use docker/compose/compose.preview.yml.

################################################################################
# Cross-cutting defaults
################################################################################

x-logging: &logging
    driver: json-file
    options:
        max-size: '10m'
        max-file: '5'

x-service-defaults: &service-defaults
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    logging: *logging
    networks: [default]
    security_opt:
        - no-new-privileges:true

x-resources-xs: &resources-xs
    limits:
        memory: 64M
        cpus: '0.25'
    reservations:
        memory: 32M

x-resources-s: &resources-s
    limits:
        memory: 128M
        cpus: '0.50'
    reservations:
        memory: 64M

x-resources-m: &resources-m
    limits:
        memory: 256M
        cpus: '1.00'
    reservations:
        memory: 128M

x-resources-l: &resources-l
    limits:
        memory: 384M
        cpus: '1.50'
    reservations:
        memory: 192M

x-resources-xl: &resources-xl
    limits:
        memory: 512M
        cpus: '2.00'
    reservations:
        memory: 256M

x-pg-healthcheck: &pg-healthcheck
    test:
        ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
    interval: 10s
    timeout: 5s
    retries: 12
    start_period: 20s

x-node-tcp-healthcheck: &node-tcp-healthcheck
    interval: 30s
    timeout: 5s
    retries: 5
    start_period: 30s

################################################################################
# App environment anchors
################################################################################

x-api-environment: &api-environment
    NODE_ENV: '${NODE_ENV:-production}'
    PORT: '3000'
    LOG_LEVEL:
    AUTH_MODE:
    OWNER_EMAIL: '${OWNER_EMAIL:?missing OWNER_EMAIL}'
    OWNER_PROVIDER:
    APP_PUBLIC_URL: '${APP_PUBLIC_URL:?missing APP_PUBLIC_URL}'
    DEEP_ID_ISSUER_URL: '${DEEP_ID_ISSUER_URL:?missing DEEP_ID_ISSUER_URL}'
    DEEP_ID_CLIENT_ID: '${DEEP_ID_CLIENT_ID:?missing DEEP_ID_CLIENT_ID}'
    DEEP_ID_CLIENT_SECRET: '${DEEP_ID_CLIENT_SECRET:?missing DEEP_ID_CLIENT_SECRET}'
    DEEP_ID_AUTH_REDIRECT_URI: '${DEEP_ID_AUTH_REDIRECT_URI:?missing DEEP_ID_AUTH_REDIRECT_URI}'
    DEEP_ID_AUTH_SCOPES: '${DEEP_ID_AUTH_SCOPES:?missing DEEP_ID_AUTH_SCOPES}'
    DEEP_ID_CONSENT_REDIRECT_URI: '${DEEP_ID_CONSENT_REDIRECT_URI:?missing DEEP_ID_CONSENT_REDIRECT_URI}'
    DEEP_ID_CONSENT_GRANT_TTL_SECONDS: '${DEEP_ID_CONSENT_GRANT_TTL_SECONDS:?missing DEEP_ID_CONSENT_GRANT_TTL_SECONDS}'
    VOTING_PORTAL_RETURN_URL: '${VOTING_PORTAL_RETURN_URL:?missing VOTING_PORTAL_RETURN_URL}'
    DEEP_ID_VOTING_PORTAL_SCOPES: '${DEEP_ID_VOTING_PORTAL_SCOPES:?missing DEEP_ID_VOTING_PORTAL_SCOPES}'
    AUTH_COOKIE_NAME:
    AUTH_COOKIE_DOMAIN:
    AUTH_COOKIE_SECURE: '${AUTH_COOKIE_SECURE:-true}'
    AUTH_COOKIE_SAME_SITE:
    AUTH_SESSION_TTL_SECONDS:
    AUTH_REFRESH_LEEWAY_SECONDS:
    AUTH_TOKEN_ENCRYPTION_KEY: '${AUTH_TOKEN_ENCRYPTION_KEY:?missing AUTH_TOKEN_ENCRYPTION_KEY}'
    AUTH_SESSION_CLEANUP_INTERVAL_MS:
    DEEP_ID_CONSENT_CLEANUP_INTERVAL_MS:
    DATABASE_URL: '${DATABASE_URL:?missing DATABASE_URL}'
    AWS_REGION: '${AWS_REGION:?missing AWS_REGION}'
    # No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY: the SDK falls through to
    # the IAM role / instance profile attached to the host.
    STORAGE_BUCKET: '${STORAGE_BUCKET:?missing STORAGE_BUCKET}'
    STORAGE_ENDPOINT:
    STORAGE_FORCE_PATH_STYLE:
    STORAGE_PRESIGN_PUT_TTL:
    STORAGE_PRESIGN_GET_TTL:
    STORAGE_MAX_SIZE_BYTES:
    STORAGE_CONTENT_TYPE_ALLOWLIST:
    TEMPORAL_ADDRESS: '${TEMPORAL_ADDRESS:-temporal:7233}'
    TEMPORAL_NAMESPACE:
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE:
    TEMPORAL_API_SNAPSHOT_ACTIVITIES_TASK_QUEUE:

x-workflows-environment: &workflows-environment
    NODE_ENV: '${NODE_ENV:-production}'
    LOG_LEVEL:
    TEMPORAL_ADDRESS: '${TEMPORAL_ADDRESS:-temporal:7233}'
    TEMPORAL_NAMESPACE:
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE:
    TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE:
    TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE:
    TEMPORAL_ONCHAIN_DATA_TASK_QUEUE:
    AWS_REGION: '${AWS_REGION:?missing AWS_REGION}'
    # No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY: see x-api-environment.
    STORAGE_BUCKET: '${STORAGE_BUCKET:?missing STORAGE_BUCKET}'
    STORAGE_ENDPOINT:
    STORAGE_FORCE_PATH_STYLE:
    STORAGE_PRESIGN_PUT_TTL:
    STORAGE_PRESIGN_GET_TTL:
    STORAGE_MAX_SIZE_BYTES:
    DEEPFUNDING_API_BASE_URL: '${DEEPFUNDING_API_BASE_URL:?missing DEEPFUNDING_API_BASE_URL}'
    DEEPFUNDING_API_KEY: '${DEEPFUNDING_API_KEY:?missing DEEPFUNDING_API_KEY}'
    ALCHEMY_API_KEY: '${ALCHEMY_API_KEY:?missing ALCHEMY_API_KEY}'
    DEEPFUNDING_API_REQUEST_TIMEOUT_MS:
    DEEPFUNDING_API_CONCURRENCY:
    DEEPFUNDING_API_DEFAULT_PAGE_LIMIT:
    DEEPFUNDING_API_RETRY_MAX_ATTEMPTS:
    DEEPFUNDING_API_RETRY_BASE_DELAY_MS:
    DEEPFUNDING_API_RETRY_MAX_DELAY_MS:
    ONCHAIN_DATABASE_URL: '${ONCHAIN_DATABASE_URL:?missing ONCHAIN_DATABASE_URL}'
    BLOCKFROST_API_KEY: '${BLOCKFROST_API_KEY:?missing BLOCKFROST_API_KEY}'

################################################################################
# Networks / volumes / secrets
################################################################################


networks:
    default:
        name: ${COMPOSE_NETWORK_NAME:-reputo}
        driver: bridge

volumes:
    postgres_data:
        driver: local
    onchain_data_postgresql_data:
        driver: local
    temporal_postgresql_data:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    loki_data:
        driver: local
    prometheus_data:
        driver: local
    grafana_data:
        driver: local

################################################################################
# Services — infra profile
################################################################################

services:
    traefik:
        <<: *service-defaults
        profiles: [infra]
        container_name: traefik
        image: traefik:v3.6
        ports:
            - '${TRAEFIK_HTTP_PORT:-80}:80'
            - '${TRAEFIK_HTTPS_PORT:-443}:443'
        environment:
            CF_DNS_API_TOKEN: '${CF_DNS_API_TOKEN:-}'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ../config/traefik/${TRAEFIK_CONFIG_FILE:-traefik.yml}:/etc/traefik/traefik.yml:ro
            - ../certs/:/var/traefik/certs/:rw
        healthcheck:
            test:
                - CMD
                - traefik
                - healthcheck
                - --ping=true
                - --ping.entrypoint=${TRAEFIK_PING_ENTRYPOINT:-web}
                - --entrypoints.${TRAEFIK_PING_ENTRYPOINT:-web}.address=:${TRAEFIK_PING_ADDRESS:-80}
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        labels:
            - traefik.enable=true
            - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN:-traefik.localhost}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))
            - traefik.http.routers.traefik.service=api@internal
            - traefik.http.routers.traefik.middlewares=auth
            - traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH:-}
            - traefik.http.middlewares.grafana-auth.basicauth.users=${GRAFANA_AUTH:-}
            - traefik.http.routers.traefik.entrypoints=${PROXY_ENTRYPOINT:-websecure}
            - traefik.http.routers.traefik.tls=${PROXY_TLS:-true}
            - traefik.http.routers.traefik.tls.certresolver=${PROXY_CERT_RESOLVER:-cloudflare}
        deploy:
            resources: *resources-s

    temporal:
        <<: *service-defaults
        profiles: [infra]
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        environment:
            DB: postgres12
            DB_PORT: '5432'
            POSTGRES_USER: '${TEMPORAL_POSTGRES_USER:?missing TEMPORAL_POSTGRES_USER}'
            POSTGRES_PWD: '${TEMPORAL_POSTGRES_PASSWORD:?missing TEMPORAL_POSTGRES_PASSWORD}'
            POSTGRES_SEEDS: temporal-postgresql
            ENABLE_ES: '${TEMPORAL_ENABLE_ES:-false}'
            ES_SEEDS: temporal-elasticsearch
            ES_VERSION: v7
        healthcheck:
            test:
                - CMD-SHELL
                - 'temporal operator cluster health --address $$(hostname -i):7233'
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s
        deploy:
            resources: *resources-m

    temporal-ui:
        <<: *service-defaults
        profiles: [infra]
        container_name: temporal-ui
        image: temporalio/ui:2.32.0
        depends_on:
            - temporal
        environment:
            TEMPORAL_ADDRESS: temporal:7233
            TEMPORAL_CORS_ORIGINS: '${ALLOWED_ORIGINS:-*}'
        labels:
            - traefik.enable=true
            - traefik.http.routers.temporal-ui.rule=Host(`${TEMPORAL_UI_DOMAIN:-temporal.localhost}`)
            - traefik.http.routers.temporal-ui.entrypoints=${PROXY_ENTRYPOINT:-websecure}
            - traefik.http.routers.temporal-ui.tls=${PROXY_TLS:-true}
            - traefik.http.routers.temporal-ui.tls.certresolver=${PROXY_CERT_RESOLVER:-cloudflare}
            - traefik.http.routers.temporal-ui.middlewares=auth
            - traefik.http.services.temporal-ui.loadbalancer.server.port=8080
        deploy:
            resources: *resources-xs

    temporal-elasticsearch:
        <<: *service-defaults
        profiles: [infra]
        container_name: temporal-elasticsearch
        image: elasticsearch:7.17.23
        environment:
            cluster.routing.allocation.disk.threshold_enabled: 'true'
            cluster.routing.allocation.disk.watermark.low: 512mb
            cluster.routing.allocation.disk.watermark.high: 256mb
            cluster.routing.allocation.disk.watermark.flood_stage: 128mb
            discovery.type: single-node
            ES_JAVA_OPTS: '-Xms256m -Xmx256m'
            xpack.security.enabled: 'false'
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        deploy:
            resources: *resources-l

    temporal-postgresql:
        <<: *service-defaults
        profiles: [infra]
        container_name: temporal-postgresql
        image: postgres:12.22
        environment:
            POSTGRES_USER: '${TEMPORAL_POSTGRES_USER:?missing TEMPORAL_POSTGRES_USER}'
            POSTGRES_PASSWORD: '${TEMPORAL_POSTGRES_PASSWORD:?missing TEMPORAL_POSTGRES_PASSWORD}'
        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data
        deploy:
            resources: *resources-s

    onchain-data-postgresql:
        <<: *service-defaults
        profiles: [infra]
        container_name: onchain-data-postgresql
        image: postgres:16
        environment:
            POSTGRES_USER: '${ONCHAIN_DATA_POSTGRES_USER:?missing ONCHAIN_DATA_POSTGRES_USER}'
            POSTGRES_PASSWORD: '${ONCHAIN_DATA_POSTGRES_PASSWORD:?missing ONCHAIN_DATA_POSTGRES_PASSWORD}'
            POSTGRES_DB: '${ONCHAIN_DATA_POSTGRES_DB_NAME:?missing ONCHAIN_DATA_POSTGRES_DB_NAME}'
        ports:
            - '${ONCHAIN_DATA_POSTGRES_HOST_BIND:-127.0.0.1}:${ONCHAIN_DATA_POSTGRES_HOST_PORT:-5433}:5432'
        volumes:
            - onchain_data_postgresql_data:/var/lib/postgresql/data
        healthcheck: *pg-healthcheck
        deploy:
            resources: *resources-m

    postgres:
        <<: *service-defaults
        profiles: [infra]
        container_name: postgres
        image: postgres:16
        environment:
            POSTGRES_USER: '${API_POSTGRES_USER:?missing API_POSTGRES_USER}'
            POSTGRES_PASSWORD: '${API_POSTGRES_PASSWORD:?missing API_POSTGRES_PASSWORD}'
            POSTGRES_DB: '${API_POSTGRES_DB_NAME:?missing API_POSTGRES_DB_NAME}'
        ports:
            - '${API_POSTGRES_HOST_BIND:-127.0.0.1}:${API_POSTGRES_HOST_PORT:-5434}:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck: *pg-healthcheck
        deploy:
            resources: *resources-l

    ############################################################################
    # Services — apps profile
    ############################################################################

    ui:
        <<: *service-defaults
        profiles: [apps]
        container_name: ui
        image: ghcr.io/reputo-org/reputo/ui:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        environment:
            PORT: '8080'
        healthcheck:
            <<: *node-tcp-healthcheck
            test:
                - CMD-SHELL
                - >-
                  node -e "require('net').connect(8080).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
        labels:
            - traefik.enable=true
            - traefik.http.routers.ui.rule=Host(`${UI_DOMAIN:?missing UI_DOMAIN}`)
            - traefik.http.routers.ui.priority=1
            - traefik.http.routers.ui.entrypoints=${PROXY_ENTRYPOINT:-websecure}
            - traefik.http.routers.ui.tls=${PROXY_TLS:-true}
            - traefik.http.routers.ui.tls.certresolver=${PROXY_CERT_RESOLVER:-cloudflare}
            - traefik.http.services.ui.loadbalancer.server.port=8080
        deploy:
            resources: *resources-s

    api:
        <<: *service-defaults
        profiles: [apps]
        container_name: api
        image: ghcr.io/reputo-org/reputo/api:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        environment: *api-environment
        healthcheck:
            <<: *node-tcp-healthcheck
            test:
                - CMD-SHELL
                - >-
                  node -e "require('net').connect(3000).on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"
        labels:
            - traefik.enable=true
            - traefik.http.routers.api.rule=Host(`${API_DOMAIN:?missing API_DOMAIN}`)
            - traefik.http.routers.api.entrypoints=${PROXY_ENTRYPOINT:-websecure}
            - traefik.http.routers.api.tls=${PROXY_TLS:-true}
            - traefik.http.routers.api.tls.certresolver=${PROXY_CERT_RESOLVER:-cloudflare}
            - traefik.http.routers.api.middlewares=api-cors
            - traefik.http.routers.api-ui.rule=Host(`${UI_DOMAIN:?missing UI_DOMAIN}`) && PathPrefix(`/api`)
            - traefik.http.routers.api-ui.priority=100
            - traefik.http.routers.api-ui.entrypoints=${PROXY_ENTRYPOINT:-websecure}
            - traefik.http.routers.api-ui.tls=${PROXY_TLS:-true}
            - traefik.http.routers.api-ui.tls.certresolver=${PROXY_CERT_RESOLVER:-cloudflare}
            - traefik.http.routers.api-ui.middlewares=api-cors
            - traefik.http.routers.api-ui.service=api
            - traefik.http.services.api.loadbalancer.server.port=3000
            - traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,OPTIONS,PUT,POST,DELETE,PATCH
            - traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=${ALLOWED_ORIGINS:-*}
            - traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,Accept,Origin,X-Requested-With
            - traefik.http.middlewares.api-cors.headers.accessControlMaxAge=3600
        deploy:
            resources: *resources-l

    orchestrator-worker:
        <<: *service-defaults
        profiles: [apps]
        container_name: orchestrator-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        command: ['pnpm', 'start:orchestrator']
        environment: *workflows-environment
        deploy:
            resources: *resources-m

    onchain-data-worker:
        <<: *service-defaults
        profiles: [apps]
        container_name: onchain-data-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        command: ['pnpm', 'start:onchain-data']
        environment: *workflows-environment
        deploy:
            resources: *resources-m

    typescript-worker:
        <<: *service-defaults
        profiles: [apps]
        container_name: typescript-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG:?missing IMAGE_TAG}
        pull_policy: always
        command: ['pnpm', 'start:algorithm-typescript']
        environment: *workflows-environment
        deploy:
            resources: *resources-m

    ############################################################################
    # Services — observability profile
    ############################################################################

    loki:
        <<: *service-defaults
        profiles: [observability]
        container_name: loki
        image: grafana/loki:3.6.7
        command: -config.file=/etc/loki/loki-config.yml
        volumes:
            - ../config/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/loki
        healthcheck:
            test: ['CMD', '/usr/bin/loki', '-health']
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 60s
        deploy:
            resources: *resources-m

    promtail:
        <<: *service-defaults
        profiles: [observability]
        container_name: promtail
        image: grafana/promtail:3.6.7
        command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
        environment:
            OBSERVABILITY_ENV: '${OBSERVABILITY_ENV:-production}'
        volumes:
            - ../config/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        depends_on:
            loki:
                condition: service_healthy
        deploy:
            resources: *resources-xs

    prometheus:
        <<: *service-defaults
        profiles: [observability]
        container_name: prometheus
        image: prom/prometheus:v3.3.0
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=15d
            - --storage.tsdb.path=/prometheus
        volumes:
            - ../config/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            - cadvisor
            - node-exporter
        deploy:
            resources: *resources-m

    cadvisor:
        <<: *service-defaults
        profiles: [observability]
        container_name: cadvisor
        image: gcr.io/cadvisor/cadvisor:v0.52.1
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro
        deploy:
            resources: *resources-xs

    node-exporter:
        <<: *service-defaults
        profiles: [observability]
        container_name: node-exporter
        image: prom/node-exporter:v1.9.0
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro
        deploy:
            resources: *resources-xs

    grafana:
        <<: *service-defaults
        profiles: [observability]
        container_name: grafana
        image: grafana/grafana:12.4.0
        environment:
            GF_SECURITY_ADMIN_USER: '${GRAFANA_ADMIN_USER:?missing GRAFANA_ADMIN_USER}'
            GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_ADMIN_PASSWORD:?missing GRAFANA_ADMIN_PASSWORD}'
            GF_SERVER_ROOT_URL: 'https://${GRAFANA_DOMAIN:?missing GRAFANA_DOMAIN}'
            GF_SERVER_SERVE_FROM_SUB_PATH: 'false'
            GF_USERS_ALLOW_SIGN_UP: 'false'
            GF_AUTH_ANONYMOUS_ENABLED: 'false'
            GF_LOG_MODE: console
            GF_LOG_LEVEL: warn
        volumes:
            - grafana_data:/var/lib/grafana
            - ../config/observability/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            loki:
                condition: service_healthy
            prometheus:
                condition: service_started
        healthcheck:
            test:
                - CMD-SHELL
                - 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1'
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 30s
        labels:
            - traefik.enable=true
            - traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN:?missing GRAFANA_DOMAIN}`)
            - traefik.http.routers.grafana.entrypoints=${PROXY_ENTRYPOINT:-websecure}
            - traefik.http.routers.grafana.tls=${PROXY_TLS:-true}
            - traefik.http.routers.grafana.tls.certresolver=${PROXY_CERT_RESOLVER:-cloudflare}
            - traefik.http.routers.grafana.middlewares=grafana-auth
            - traefik.http.services.grafana.loadbalancer.server.port=3000
        deploy:
            resources: *resources-s
