x-dev-environment: &dev-environment
    NODE_ENV: development
    CHOKIDAR_USEPOLLING: 'true'
    WATCHPACK_POLLING: 'true'
    TSC_WATCHFILE: UsePolling
    TSC_WATCHDIRECTORY: UsePolling
    NEXT_TELEMETRY_DISABLED: '1'

x-dev-volumes: &dev-volumes
    - ../..:/workspace
    - repo_node_modules:/workspace/node_modules
    - repo_pnpm_store:/pnpm/store
    - apps_api_node_modules:/workspace/apps/api/node_modules
    - apps_ui_node_modules:/workspace/apps/ui/node_modules
    - apps_workflows_node_modules:/workspace/apps/workflows/node_modules
    - packages_algorithm_validator_node_modules:/workspace/packages/algorithm-validator/node_modules
    - packages_database_node_modules:/workspace/packages/database/node_modules
    - packages_deepfunding_portal_api_node_modules:/workspace/packages/deepfunding-portal-api/node_modules
    - packages_onchain_data_node_modules:/workspace/packages/onchain-data/node_modules
    - packages_reputation_algorithms_node_modules:/workspace/packages/reputation-algorithms/node_modules
    - packages_storage_node_modules:/workspace/packages/storage/node_modules

x-dev-service: &dev-service
    build:
        context: ../..
        dockerfile: docker/images/Dockerfile.dev
    working_dir: /workspace
    init: true
    restart: unless-stopped
    environment: *dev-environment
    volumes: *dev-volumes

networks:
    dev:
        driver: bridge

volumes:
    repo_node_modules:
        driver: local
    repo_pnpm_store:
        driver: local
    apps_api_node_modules:
        driver: local
    apps_ui_node_modules:
        driver: local
    apps_workflows_node_modules:
        driver: local
    packages_algorithm_validator_node_modules:
        driver: local
    packages_database_node_modules:
        driver: local
    packages_deepfunding_portal_api_node_modules:
        driver: local
    packages_onchain_data_node_modules:
        driver: local
    packages_reputation_algorithms_node_modules:
        driver: local
    packages_storage_node_modules:
        driver: local
    mongodb_data:
        driver: local
    mongodb_keyfile:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    temporal_postgresql_data:
        driver: local
    onchain_data_postgresql_data:
        driver: local
    loki_data:
        driver: local
    grafana_data:
        driver: local
    prometheus_data:
        driver: local
    minio_data:
        driver: local

services:
    mongodb:
        container_name: mongodb
        image: mongo:7.0.5
        restart: unless-stopped
        networks: [dev]
        user: '0:0'
        entrypoint: >
            /bin/bash -c '
            set -euo pipefail;
            keyfile=/etc/mongo-keyfile/keyfile.txt;
            if [ ! -s "$$keyfile" ]; then
                head -c 756 /dev/urandom | base64 | tr -d "\n" > "$$keyfile";
            fi;
            chown 999:999 "$$keyfile";
            chmod 400 "$$keyfile";
            exec docker-entrypoint.sh mongod
            --replSet rs0
            --keyFile "$$keyfile"
            --bind_ip_all
            '
        ports:
            - 27017:27017
        env_file:
            - ../env/mongodb.env
        volumes:
            - ../config/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
            - ../config/mongo/healthcheck.js:/etc/mongo/healthcheck.js:ro
            - mongodb_keyfile:/etc/mongo-keyfile
            - mongodb_data:/data/db
        healthcheck:
            test: test $(echo $(mongosh -u $$MONGO_INITDB_ROOT_USERNAME -p $$MONGO_INITDB_ROOT_PASSWORD --quiet /etc/mongo/healthcheck.js)) -eq 1
            interval: 60s
            timeout: 60s
            retries: 5
            start_period: 40s

    traefik:
        image: traefik:v3.6
        container_name: traefik
        ports:
            - '80:80'
            - '8080:8080'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks: [dev]
        healthcheck:
            test:
                [
                    'CMD',
                    'traefik',
                    'healthcheck',
                    '--ping=true',
                    '--ping.entrypoint=web8080',
                    '--entrypoints.web8080.address=:8080',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        command:
            - --api=true
            - --ping=true
            - --ping.entrypoint=web8080
            - --providers.docker=true
            - --providers.docker.exposedByDefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.web8080.address=:8080
            - --entrypoints.traefik.address=:8081

    api:
        <<: *dev-service
        container_name: api
        command: pnpm --filter @reputo/api dev
        networks: [dev]
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        env_file:
            - ../env/api.env
        labels:
            - traefik.enable=true
            - traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)
            - traefik.http.routers.api.priority=100
            - traefik.http.routers.api.entrypoints=web,web8080
            - traefik.http.services.api.loadbalancer.server.port=3000

    ui:
        <<: *dev-service
        container_name: ui
        command: pnpm --filter @reputo/ui dev
        networks: [dev]
        env_file:
            - ../env/ui.env
        labels:
            - traefik.enable=true
            - traefik.http.routers.ui.rule=Host(`localhost`)
            - traefik.http.routers.ui.priority=1
            - traefik.http.routers.ui.entrypoints=web,web8080
            - traefik.http.services.ui.loadbalancer.server.port=4000

    temporal:
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        restart: unless-stopped
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        ports:
            - '7233:7233'
        env_file: ../env/temporal.env
        networks: [dev]
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'temporal operator cluster health --address $(hostname -i):7233',
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s

    temporal-ui:
        container_name: temporal-ui
        image: temporalio/ui:2.32.0
        restart: unless-stopped
        env_file: ../env/temporal-ui.env
        depends_on:
            - temporal
        ports:
            - '8088:8080'
        networks: [dev]

    temporal-elasticsearch:
        container_name: temporal-elasticsearch
        restart: unless-stopped
        image: elasticsearch:7.17.23
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        networks: [dev]

    temporal-postgresql:
        container_name: temporal-postgresql
        image: postgres:12.22
        restart: unless-stopped
        env_file: ../env/temporal-postgresql.env
        networks: [dev]
        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data

    onchain-data-postgresql:
        container_name: onchain-data-postgresql
        image: postgres:16
        restart: unless-stopped
        env_file: ../env/onchain-data-postgresql.env
        networks: [dev]
        ports:
            - 5433:5432
        volumes:
            - onchain_data_postgresql_data:/var/lib/postgresql/data
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    minio:
        container_name: minio
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        restart: unless-stopped
        networks: [dev]
        ports:
            - '9000:9000'
            - '9001:9001'
        env_file: ../env/minio.env
        command: server /data --console-address ":9001"
        volumes:
            - minio_data:/data
        healthcheck:
            test:
                [
                    'CMD',
                    'curl',
                    '-fsS',
                    'http://localhost:9000/minio/health/live',
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s
        labels:
            - traefik.enable=true
            - traefik.http.routers.minio-console.rule=Host(`minio.localhost`)
            - traefik.http.routers.minio-console.entrypoints=web,web8080
            - traefik.http.services.minio-console.loadbalancer.server.port=9001

    minio-init:
        container_name: minio-init
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        networks: [dev]
        depends_on:
            minio:
                condition: service_healthy
        env_file: ../env/minio.env
        entrypoint: >
            /bin/sh -c '
            set -euo pipefail;
            mc alias set local "http://minio:9000" "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
            for bucket in $$(echo "$$MINIO_BUCKETS" | tr "," " "); do
                mc mb --ignore-existing "local/$$bucket";
            done;
            echo "MinIO buckets ready: $$MINIO_BUCKETS";
            '
        restart: 'no'

    orchestrator-worker:
        <<: *dev-service
        container_name: orchestrator-worker
        command: pnpm --filter @reputo/workflows dev:orchestrator
        networks: [dev]
        depends_on:
            mongodb:
                condition: service_healthy
            temporal:
                condition: service_healthy
        env_file:
            - ../env/workflows.env

    onchain-data-worker:
        <<: *dev-service
        container_name: onchain-data-worker
        command: pnpm --filter @reputo/workflows dev:onchain-data
        networks: [dev]
        depends_on:
            temporal:
                condition: service_healthy
            onchain-data-postgresql:
                condition: service_healthy
        env_file:
            - ../env/workflows.env

    typescript-worker:
        <<: *dev-service
        container_name: typescript-worker
        command: pnpm --filter @reputo/workflows dev:algorithm-typescript
        networks: [dev]
        depends_on:
            temporal:
                condition: service_healthy
            onchain-data-postgresql:
                condition: service_healthy
        env_file:
            - ../env/workflows.env

    loki:
        container_name: loki
        image: grafana/loki:3.6.7
        restart: unless-stopped
        networks: [dev]
        command: -config.file=/etc/loki/loki-config.yml
        volumes:
            - ../config/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/loki
        healthcheck:
            test: ['CMD', '/usr/bin/loki', '-health']
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 60s

    promtail:
        container_name: promtail
        image: grafana/promtail:3.6.7
        restart: unless-stopped
        networks: [dev]
        command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
        environment:
            - OBSERVABILITY_ENV=development
        volumes:
            - ../config/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        depends_on:
            loki:
                condition: service_healthy

    prometheus:
        container_name: prometheus
        image: prom/prometheus:v3.3.0
        restart: unless-stopped
        networks: [dev]
        ports:
            - '9099:9090'
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
            - --storage.tsdb.path=/prometheus
        volumes:
            - ../config/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            - cadvisor
            - node-exporter

    cadvisor:
        container_name: cadvisor
        image: ghcr.io/google/cadvisor:0.55.1
        restart: unless-stopped
        networks: [dev]
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro

    node-exporter:
        container_name: node-exporter
        image: prom/node-exporter:v1.9.0
        restart: unless-stopped
        networks: [dev]
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro

    grafana:
        container_name: grafana
        image: grafana/grafana:12.4.0
        restart: unless-stopped
        networks: [dev]
        ports:
            - '3001:3000'
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
            - GF_LOG_LEVEL=warn
        volumes:
            - grafana_data:/var/lib/grafana
            - ../config/observability/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            loki:
                condition: service_healthy
            prometheus:
                condition: service_started
