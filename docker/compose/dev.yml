# Env-var policy
#
# `pnpm docker:dev` runs `scripts/env/load.ts` first to populate process env
# from the repo-root `.env` file, then invokes `docker compose -f dev.yml up`.
# Compose interpolates `${VAR}` below using that env. No `env_file:` directives
# anywhere in this file — the per-service `environment:` blocks (via the
# `x-<app>-env` anchors) are the only thing each container sees.
#
# Syntax:
#   `KEY: "${KEY:?missing KEY}"`  — required; compose errors if KEY unset
#   `KEY: "${KEY:-default}"`      — divergent from Zod default
#   `KEY:`                        — YAML null = "pass through if set, omit if
#                                    not"; Zod's default applies when omitted
#   `KEY: literal`                — value diverges from `.env` (e.g. in-network
#                                    URLs that use Docker service hostnames)

x-dev-watch: &dev-watch
    CHOKIDAR_USEPOLLING: 'true'
    WATCHPACK_POLLING: 'true'
    TSC_WATCHFILE: UsePolling
    TSC_WATCHDIRECTORY: UsePolling
    NEXT_TELEMETRY_DISABLED: '1'

x-api-env: &api-env
    <<: *dev-watch
    # Dev stack is always development; root `.env` NODE_ENV is for `pnpm dev`.
    NODE_ENV: development
    PORT: "3000"
    LOG_LEVEL:
    AUTH_MODE:
    OWNER_EMAIL: "${OWNER_EMAIL:?missing OWNER_EMAIL}"
    OWNER_PROVIDER:
    APP_PUBLIC_URL: "${APP_PUBLIC_URL:?missing APP_PUBLIC_URL}"
    DEEP_ID_ISSUER_URL: "${DEEP_ID_ISSUER_URL:?missing DEEP_ID_ISSUER_URL}"
    DEEP_ID_CLIENT_ID: "${DEEP_ID_CLIENT_ID:?missing DEEP_ID_CLIENT_ID}"
    DEEP_ID_CLIENT_SECRET: "${DEEP_ID_CLIENT_SECRET:?missing DEEP_ID_CLIENT_SECRET}"
    DEEP_ID_AUTH_REDIRECT_URI: "${DEEP_ID_AUTH_REDIRECT_URI:?missing DEEP_ID_AUTH_REDIRECT_URI}"
    DEEP_ID_AUTH_SCOPES: "${DEEP_ID_AUTH_SCOPES:?missing DEEP_ID_AUTH_SCOPES}"
    DEEP_ID_CONSENT_REDIRECT_URI: "${DEEP_ID_CONSENT_REDIRECT_URI:?missing DEEP_ID_CONSENT_REDIRECT_URI}"
    DEEP_ID_CONSENT_GRANT_TTL_SECONDS: "${DEEP_ID_CONSENT_GRANT_TTL_SECONDS:?missing DEEP_ID_CONSENT_GRANT_TTL_SECONDS}"
    VOTING_PORTAL_RETURN_URL: "${VOTING_PORTAL_RETURN_URL:?missing VOTING_PORTAL_RETURN_URL}"
    DEEP_ID_VOTING_PORTAL_SCOPES: "${DEEP_ID_VOTING_PORTAL_SCOPES:?missing DEEP_ID_VOTING_PORTAL_SCOPES}"
    AUTH_COOKIE_NAME:
    AUTH_COOKIE_DOMAIN:
    AUTH_COOKIE_SECURE:
    AUTH_COOKIE_SAME_SITE:
    AUTH_SESSION_TTL_SECONDS:
    AUTH_REFRESH_LEEWAY_SECONDS:
    AUTH_TOKEN_ENCRYPTION_KEY: "${AUTH_TOKEN_ENCRYPTION_KEY:?missing AUTH_TOKEN_ENCRYPTION_KEY}"
    AUTH_SESSION_CLEANUP_INTERVAL_MS:
    DEEP_ID_CONSENT_CLEANUP_INTERVAL_MS:
    # In-network URL; overrides root `.env` DATABASE_URL (which uses
    # localhost:5434 for `pnpm dev`). Credentials must agree with the
    # hardcoded `postgres` service block below.
    DATABASE_URL: postgresql://reputo_app:reputo_app@postgres:5432/reputo_app
    AWS_REGION: "${AWS_REGION:?missing AWS_REGION}"
    AWS_ACCESS_KEY_ID:
    AWS_SECRET_ACCESS_KEY:
    STORAGE_BUCKET: "${STORAGE_BUCKET:?missing STORAGE_BUCKET}"
    STORAGE_PRESIGN_PUT_TTL:
    STORAGE_PRESIGN_GET_TTL:
    STORAGE_MAX_SIZE_BYTES:
    STORAGE_CONTENT_TYPE_ALLOWLIST:
    # In-network host:port for the temporal service.
    TEMPORAL_ADDRESS: temporal:7233
    TEMPORAL_NAMESPACE:
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE:
    TEMPORAL_API_SNAPSHOT_ACTIVITIES_TASK_QUEUE:

x-ui-env: &ui-env
    <<: *dev-watch
    NODE_ENV: development
    PORT: "4000"
    AUTH_COOKIE_NAME:
    # Dev-only Next.js rewrite proxy target; inside docker the api is
    # reachable as `api:3000`.
    API_PROXY_TARGET: http://api:3000

x-workflows-env: &workflows-env
    <<: *dev-watch
    NODE_ENV: development
    LOG_LEVEL:
    TEMPORAL_ADDRESS: temporal:7233
    TEMPORAL_NAMESPACE:
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE:
    TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE:
    TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE:
    TEMPORAL_ONCHAIN_DATA_TASK_QUEUE:
    AWS_REGION: "${AWS_REGION:?missing AWS_REGION}"
    AWS_ACCESS_KEY_ID:
    AWS_SECRET_ACCESS_KEY:
    STORAGE_BUCKET: "${STORAGE_BUCKET:?missing STORAGE_BUCKET}"
    STORAGE_PRESIGN_PUT_TTL:
    STORAGE_PRESIGN_GET_TTL:
    STORAGE_MAX_SIZE_BYTES:
    DEEPFUNDING_API_BASE_URL: "${DEEPFUNDING_API_BASE_URL:?missing DEEPFUNDING_API_BASE_URL}"
    DEEPFUNDING_API_KEY: "${DEEPFUNDING_API_KEY:?missing DEEPFUNDING_API_KEY}"
    DEEPFUNDING_API_REQUEST_TIMEOUT_MS:
    DEEPFUNDING_API_CONCURRENCY:
    DEEPFUNDING_API_DEFAULT_PAGE_LIMIT:
    DEEPFUNDING_API_RETRY_MAX_ATTEMPTS:
    DEEPFUNDING_API_RETRY_BASE_DELAY_MS:
    DEEPFUNDING_API_RETRY_MAX_DELAY_MS:
    # In-network URL; overrides root `.env` ONCHAIN_DATABASE_URL.
    ONCHAIN_DATABASE_URL: postgresql://reputo_onchain:reputo_onchain@onchain-data-postgresql:5432/reputo_onchain
    ALCHEMY_API_KEY: "${ALCHEMY_API_KEY:?missing ALCHEMY_API_KEY}"
    BLOCKFROST_API_KEY: "${BLOCKFROST_API_KEY:?missing BLOCKFROST_API_KEY}"

x-dev-volumes: &dev-volumes
    - ../..:/workspace
    - repo_node_modules:/workspace/node_modules
    - repo_pnpm_store:/pnpm/store
    - apps_api_node_modules:/workspace/apps/api/node_modules
    - apps_ui_node_modules:/workspace/apps/ui/node_modules
    - apps_workflows_node_modules:/workspace/apps/workflows/node_modules
    - packages_algorithm_validator_node_modules:/workspace/packages/algorithm-validator/node_modules
    - packages_deepfunding_portal_api_node_modules:/workspace/packages/deepfunding-portal-api/node_modules
    - packages_onchain_data_node_modules:/workspace/packages/onchain-data/node_modules
    - packages_reputation_algorithms_node_modules:/workspace/packages/reputation-algorithms/node_modules
    - packages_storage_node_modules:/workspace/packages/storage/node_modules

x-dev-service: &dev-service
    build:
        context: ../..
        dockerfile: docker/images/Dockerfile.dev
    working_dir: /workspace
    init: true
    restart: unless-stopped
    volumes: *dev-volumes

networks:
    dev:
        driver: bridge

volumes:
    repo_node_modules:
        driver: local
    repo_pnpm_store:
        driver: local
    apps_api_node_modules:
        driver: local
    apps_ui_node_modules:
        driver: local
    apps_workflows_node_modules:
        driver: local
    packages_algorithm_validator_node_modules:
        driver: local
    packages_deepfunding_portal_api_node_modules:
        driver: local
    packages_onchain_data_node_modules:
        driver: local
    packages_reputation_algorithms_node_modules:
        driver: local
    packages_storage_node_modules:
        driver: local
    temporal_elasticsearch_data:
        driver: local
    temporal_postgresql_data:
        driver: local
    onchain_data_postgresql_data:
        driver: local
    postgres_data:
        driver: local
    loki_data:
        driver: local
    grafana_data:
        driver: local
    prometheus_data:
        driver: local

services:
    traefik:
        image: traefik:v3.6
        container_name: traefik
        ports:
            - '80:80'
            - '8080:8080'
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks: [dev]
        healthcheck:
            test:
                [
                    'CMD',
                    'traefik',
                    'healthcheck',
                    '--ping=true',
                    '--ping.entrypoint=web8080',
                    '--entrypoints.web8080.address=:8080',
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
        command:
            - --api=true
            - --ping=true
            - --ping.entrypoint=web8080
            - --providers.docker=true
            - --providers.docker.exposedByDefault=false
            - --entrypoints.web.address=:80
            - --entrypoints.web8080.address=:8080
            - --entrypoints.traefik.address=:8081

    api:
        <<: *dev-service
        container_name: api
        command: pnpm --filter @reputo/api dev
        networks: [dev]
        depends_on:
            postgres:
                condition: service_healthy
            temporal:
                condition: service_healthy
        environment: *api-env
        labels:
            - traefik.enable=true
            - traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)
            - traefik.http.routers.api.priority=100
            - traefik.http.routers.api.entrypoints=web,web8080
            - traefik.http.services.api.loadbalancer.server.port=3000

    ui:
        <<: *dev-service
        container_name: ui
        command: pnpm --filter @reputo/ui dev
        networks: [dev]
        environment: *ui-env
        labels:
            - traefik.enable=true
            - traefik.http.routers.ui.rule=Host(`localhost`)
            - traefik.http.routers.ui.priority=1
            - traefik.http.routers.ui.entrypoints=web,web8080
            - traefik.http.services.ui.loadbalancer.server.port=4000

    temporal:
        container_name: temporal
        image: temporalio/auto-setup:1.26.3.0
        restart: unless-stopped
        depends_on:
            - temporal-postgresql
            - temporal-elasticsearch
        ports:
            - '7233:7233'
        # Upstream auto-setup image expects POSTGRES_PWD; we keep the source
        # name uniform with the postgres image (POSTGRES_PASSWORD) by
        # translating here. Matches the prod pattern in infra.yml.
        environment:
            DB: postgres12
            DB_PORT: "5432"
            POSTGRES_USER: temporal
            POSTGRES_PWD: temporal
            POSTGRES_SEEDS: temporal-postgresql
            ENABLE_ES: "false"
            ES_SEEDS: temporal-elasticsearch
            ES_VERSION: v7
        networks: [dev]
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'temporal operator cluster health --address $(hostname -i):7233',
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 120s

    temporal-ui:
        container_name: temporal-ui
        image: temporalio/ui:2.32.0
        restart: unless-stopped
        environment:
            TEMPORAL_ADDRESS: temporal:7233
            TEMPORAL_CORS_ORIGINS: "*"
        depends_on:
            - temporal
        ports:
            - '8088:8080'
        networks: [dev]

    temporal-elasticsearch:
        container_name: temporal-elasticsearch
        restart: unless-stopped
        image: elasticsearch:7.17.23
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        volumes:
            - temporal_elasticsearch_data:/var/lib/elasticsearch/data
        networks: [dev]

    temporal-postgresql:
        container_name: temporal-postgresql
        image: postgres:12.22
        restart: unless-stopped
        environment:
            POSTGRES_USER: temporal
            POSTGRES_PASSWORD: temporal
        networks: [dev]
        volumes:
            - temporal_postgresql_data:/var/lib/postgresql/data

    onchain-data-postgresql:
        container_name: onchain-data-postgresql
        image: postgres:16
        restart: unless-stopped
        # Credentials must agree with ONCHAIN_DATABASE_URL in *workflows-env.
        environment:
            POSTGRES_USER: reputo_onchain
            POSTGRES_PASSWORD: reputo_onchain
            POSTGRES_DB: reputo_onchain
        networks: [dev]
        ports:
            - 5433:5432
        volumes:
            - onchain_data_postgresql_data:/var/lib/postgresql/data
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    postgres:
        container_name: postgres
        image: postgres:16
        restart: unless-stopped
        # Credentials must agree with DATABASE_URL in *api-env.
        environment:
            POSTGRES_USER: reputo_app
            POSTGRES_PASSWORD: reputo_app
            POSTGRES_DB: reputo_app
        networks: [dev]
        ports:
            - 5434:5432
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    orchestrator-worker:
        <<: *dev-service
        container_name: orchestrator-worker
        command: pnpm --filter @reputo/workflows dev:orchestrator
        networks: [dev]
        depends_on:
            temporal:
                condition: service_healthy
        environment: *workflows-env

    onchain-data-worker:
        <<: *dev-service
        container_name: onchain-data-worker
        command: pnpm --filter @reputo/workflows dev:onchain-data
        networks: [dev]
        depends_on:
            temporal:
                condition: service_healthy
            onchain-data-postgresql:
                condition: service_healthy
        environment: *workflows-env

    typescript-worker:
        <<: *dev-service
        container_name: typescript-worker
        command: pnpm --filter @reputo/workflows dev:algorithm-typescript
        networks: [dev]
        depends_on:
            temporal:
                condition: service_healthy
            onchain-data-postgresql:
                condition: service_healthy
        environment: *workflows-env

    loki:
        container_name: loki
        image: grafana/loki:3.6.7
        restart: unless-stopped
        networks: [dev]
        command: -config.file=/etc/loki/loki-config.yml
        volumes:
            - ../config/observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
            - loki_data:/loki
        healthcheck:
            test: ['CMD', '/usr/bin/loki', '-health']
            interval: 15s
            timeout: 5s
            retries: 10
            start_period: 60s

    promtail:
        container_name: promtail
        image: grafana/promtail:3.6.7
        restart: unless-stopped
        networks: [dev]
        command: -config.file=/etc/promtail/promtail-config.yml -config.expand-env=true
        environment:
            - OBSERVABILITY_ENV=development
        volumes:
            - ../config/observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        depends_on:
            loki:
                condition: service_healthy

    prometheus:
        container_name: prometheus
        image: prom/prometheus:v3.3.0
        restart: unless-stopped
        networks: [dev]
        ports:
            - '9099:9090'
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=7d
            - --storage.tsdb.path=/prometheus
        volumes:
            - ../config/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            - cadvisor
            - node-exporter

    cadvisor:
        container_name: cadvisor
        image: gcr.io/cadvisor/cadvisor:v0.52.1
        restart: unless-stopped
        networks: [dev]
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro

    node-exporter:
        container_name: node-exporter
        image: prom/node-exporter:v1.9.0
        restart: unless-stopped
        networks: [dev]
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro

    grafana:
        container_name: grafana
        image: grafana/grafana:12.4.0
        restart: unless-stopped
        networks: [dev]
        ports:
            - '3001:3000'
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=admin
            - GF_USERS_ALLOW_SIGN_UP=false
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
            - GF_LOG_LEVEL=warn
        volumes:
            - grafana_data:/var/lib/grafana
            - ../config/observability/grafana/provisioning:/etc/grafana/provisioning:ro
        depends_on:
            loki:
                condition: service_healthy
            prometheus:
                condition: service_started
