networks:
    production:
        external: true

x-api-environment: &api-environment
    NODE_ENV: "${NODE_ENV:-production}"
    PORT: "3000"
    LOG_LEVEL: "${LOG_LEVEL:-info}"
    AUTH_MODE: "${AUTH_MODE:-oauth}"
    # Required for AUTH_MODE=oauth; API startup fails if this is missing or conflicts with an active owner.
    OWNER_EMAIL: "${OWNER_EMAIL:?missing OWNER_EMAIL}"
    APP_PUBLIC_URL: "${APP_PUBLIC_URL:?missing APP_PUBLIC_URL}"
    MONGODB_HOST: "${MONGODB_HOST:-mongodb}"
    MONGODB_PORT: "${MONGODB_PORT:-27017}"
    MONGODB_DB_NAME: "${MONGODB_DB_NAME:?missing MONGODB_DB_NAME}"
    MONGODB_USER: "${MONGODB_USER:?missing MONGODB_USER}"
    MONGODB_PASSWORD: "${MONGODB_PASSWORD:?missing MONGODB_PASSWORD}"
    DEEP_ID_ISSUER_URL: "${DEEP_ID_ISSUER_URL:?missing DEEP_ID_ISSUER_URL}"
    DEEP_ID_CLIENT_ID: "${DEEP_ID_CLIENT_ID:?missing DEEP_ID_CLIENT_ID}"
    DEEP_ID_CLIENT_SECRET: "${DEEP_ID_CLIENT_SECRET:?missing DEEP_ID_CLIENT_SECRET}"
    DEEP_ID_AUTH_REDIRECT_URI: "${DEEP_ID_AUTH_REDIRECT_URI:?missing DEEP_ID_AUTH_REDIRECT_URI}"
    DEEP_ID_AUTH_SCOPES: "${DEEP_ID_AUTH_SCOPES:?missing DEEP_ID_AUTH_SCOPES}"
    DEEP_ID_CONSENT_REDIRECT_URI: "${DEEP_ID_CONSENT_REDIRECT_URI:?missing DEEP_ID_CONSENT_REDIRECT_URI}"
    DEEP_ID_CONSENT_GRANT_TTL_SECONDS: "${DEEP_ID_CONSENT_GRANT_TTL_SECONDS:?missing DEEP_ID_CONSENT_GRANT_TTL_SECONDS}"
    VOTING_PORTAL_RETURN_URL: "${VOTING_PORTAL_RETURN_URL:?missing VOTING_PORTAL_RETURN_URL}"
    DEEP_ID_VOTING_PORTAL_SCOPES: "${DEEP_ID_VOTING_PORTAL_SCOPES:?missing DEEP_ID_VOTING_PORTAL_SCOPES}"
    AUTH_COOKIE_NAME: "${AUTH_COOKIE_NAME:-reputo_auth_session}"
    AUTH_COOKIE_DOMAIN: "${AUTH_COOKIE_DOMAIN:-}"
    AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE:-true}"
    AUTH_COOKIE_SAME_SITE: "${AUTH_COOKIE_SAME_SITE:-lax}"
    AUTH_SESSION_TTL_SECONDS: "${AUTH_SESSION_TTL_SECONDS:-2592000}"
    AUTH_REFRESH_LEEWAY_SECONDS: "${AUTH_REFRESH_LEEWAY_SECONDS:-60}"
    AUTH_TOKEN_ENCRYPTION_KEY: "${AUTH_TOKEN_ENCRYPTION_KEY:?missing AUTH_TOKEN_ENCRYPTION_KEY}"
    AWS_REGION: "${AWS_REGION:?missing AWS_REGION}"
    STORAGE_BUCKET: "${STORAGE_BUCKET:?missing STORAGE_BUCKET}"
    STORAGE_PRESIGN_PUT_TTL: "${STORAGE_PRESIGN_PUT_TTL:-120}"
    STORAGE_PRESIGN_GET_TTL: "${STORAGE_PRESIGN_GET_TTL:-300}"
    STORAGE_MAX_SIZE_BYTES: "${STORAGE_MAX_SIZE_BYTES:-52428800}"
    STORAGE_CONTENT_TYPE_ALLOWLIST: "${API_STORAGE_CONTENT_TYPE_ALLOWLIST:-text/csv,text/plain,application/json}"
    TEMPORAL_ADDRESS: "${TEMPORAL_ADDRESS:-temporal:7233}"
    TEMPORAL_NAMESPACE: "${TEMPORAL_NAMESPACE:-default}"
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE: "${TEMPORAL_ORCHESTRATOR_TASK_QUEUE:-orchestrator-worker}"

x-workflows-environment: &workflows-environment
    NODE_ENV: "${NODE_ENV:-production}"
    LOG_LEVEL: "${LOG_LEVEL:-info}"
    TEMPORAL_ADDRESS: "${TEMPORAL_ADDRESS:-temporal:7233}"
    TEMPORAL_NAMESPACE: "${TEMPORAL_NAMESPACE:-default}"
    TEMPORAL_ORCHESTRATOR_TASK_QUEUE: "${TEMPORAL_ORCHESTRATOR_TASK_QUEUE:-orchestrator-worker}"
    TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE: "${TEMPORAL_ALGORITHM_TYPESCRIPT_TASK_QUEUE:-algorithm-typescript-worker}"
    TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE: "${TEMPORAL_ALGORITHM_PYTHON_TASK_QUEUE:-algorithm-python-worker}"
    TEMPORAL_ONCHAIN_DATA_TASK_QUEUE: "${TEMPORAL_ONCHAIN_DATA_TASK_QUEUE:-onchain-data-worker}"
    MONGODB_HOST: "${MONGODB_HOST:-mongodb}"
    MONGODB_PORT: "${MONGODB_PORT:-27017}"
    MONGODB_DB_NAME: "${MONGODB_DB_NAME:?missing MONGODB_DB_NAME}"
    MONGODB_USER: "${MONGODB_USER:?missing MONGODB_USER}"
    MONGODB_PASSWORD: "${MONGODB_PASSWORD:?missing MONGODB_PASSWORD}"
    AWS_REGION: "${AWS_REGION:?missing AWS_REGION}"
    STORAGE_BUCKET: "${STORAGE_BUCKET:?missing STORAGE_BUCKET}"
    STORAGE_PRESIGN_PUT_TTL: "${STORAGE_PRESIGN_PUT_TTL:-120}"
    STORAGE_PRESIGN_GET_TTL: "${STORAGE_PRESIGN_GET_TTL:-300}"
    STORAGE_MAX_SIZE_BYTES: "${STORAGE_MAX_SIZE_BYTES:-52428800}"
    STORAGE_CONTENT_TYPE_ALLOWLIST: "${WORKFLOWS_STORAGE_CONTENT_TYPE_ALLOWLIST:-text/csv,application/json,application/x-sqlite3}"
    DEEPFUNDING_API_BASE_URL: "${DEEPFUNDING_API_BASE_URL:?missing DEEPFUNDING_API_BASE_URL}"
    DEEPFUNDING_API_KEY: "${DEEPFUNDING_API_KEY:?missing DEEPFUNDING_API_KEY}"
    DEEPFUNDING_API_REQUEST_TIMEOUT_MS: "${DEEPFUNDING_API_REQUEST_TIMEOUT_MS:-45000}"
    DEEPFUNDING_API_CONCURRENCY: "${DEEPFUNDING_API_CONCURRENCY:-4}"
    DEEPFUNDING_API_DEFAULT_PAGE_LIMIT: "${DEEPFUNDING_API_DEFAULT_PAGE_LIMIT:-500}"
    DEEPFUNDING_API_RETRY_MAX_ATTEMPTS: "${DEEPFUNDING_API_RETRY_MAX_ATTEMPTS:-7}"
    DEEPFUNDING_API_RETRY_BASE_DELAY_MS: "${DEEPFUNDING_API_RETRY_BASE_DELAY_MS:-500}"
    DEEPFUNDING_API_RETRY_MAX_DELAY_MS: "${DEEPFUNDING_API_RETRY_MAX_DELAY_MS:-20000}"
    ONCHAIN_DATA_POSTGRES_HOST: "${ONCHAIN_DATA_POSTGRES_HOST:-onchain-data-postgresql}"
    ONCHAIN_DATA_POSTGRES_PORT: "${ONCHAIN_DATA_POSTGRES_PORT:-5432}"
    ONCHAIN_DATA_POSTGRES_DB_NAME: "${ONCHAIN_DATA_POSTGRES_DB_NAME:?missing ONCHAIN_DATA_POSTGRES_DB_NAME}"
    ONCHAIN_DATA_POSTGRES_USER: "${ONCHAIN_DATA_POSTGRES_USER:?missing ONCHAIN_DATA_POSTGRES_USER}"
    ONCHAIN_DATA_POSTGRES_PASSWORD: "${ONCHAIN_DATA_POSTGRES_PASSWORD:?missing ONCHAIN_DATA_POSTGRES_PASSWORD}"
    ALCHEMY_API_KEY: "${ALCHEMY_API_KEY:?missing ALCHEMY_API_KEY}"
    BLOCKFROST_API_KEY: "${BLOCKFROST_API_KEY:?missing BLOCKFROST_API_KEY}"

services:
    ui:
        container_name: ui
        image: ghcr.io/reputo-org/reputo/ui:${IMAGE_TAG}
        restart: unless-stopped
        networks: [production]
        environment:
            PORT: "8080"
        labels:
            - traefik.enable=true
            - traefik.http.routers.ui.rule=Host(`${UI_DOMAIN}`)
            - traefik.http.routers.ui.priority=1
            - traefik.http.routers.ui.tls=true
            - traefik.http.routers.ui.tls.certresolver=cloudflare
            - traefik.http.routers.ui.entrypoints=websecure
            - traefik.http.services.ui.loadbalancer.server.port=8080

    api:
        container_name: api
        image: ghcr.io/reputo-org/reputo/api:${IMAGE_TAG}
        restart: unless-stopped
        networks: [production]
        labels:
            - traefik.enable=true
            - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
            - traefik.http.routers.api.tls=true
            - traefik.http.routers.api.tls.certresolver=cloudflare
            - traefik.http.routers.api.entrypoints=websecure
            - traefik.http.routers.api.middlewares=api-cors
            - traefik.http.routers.api-ui.rule=Host(`${UI_DOMAIN}`) && PathPrefix(`/api`)
            - traefik.http.routers.api-ui.priority=100
            - traefik.http.routers.api-ui.tls=true
            - traefik.http.routers.api-ui.tls.certresolver=cloudflare
            - traefik.http.routers.api-ui.entrypoints=websecure
            - traefik.http.routers.api-ui.middlewares=api-cors
            - traefik.http.routers.api-ui.service=api
            - traefik.http.services.api.loadbalancer.server.port=3000
            - traefik.http.middlewares.api-cors.headers.accessControlAllowMethods=GET,OPTIONS,PUT,POST,DELETE,PATCH
            - traefik.http.middlewares.api-cors.headers.accessControlAllowOriginList=${ALLOWED_ORIGINS:-*}
            - traefik.http.middlewares.api-cors.headers.accessControlAllowHeaders=Content-Type,Authorization,Accept,Origin,X-Requested-With
            - traefik.http.middlewares.api-cors.headers.accessControlMaxAge=3600
        environment: *api-environment

    orchestrator-worker:
        container_name: orchestrator-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG}
        command: ['pnpm', 'start:orchestrator']
        restart: unless-stopped
        networks: [production]
        environment: *workflows-environment

    onchain-data-worker:
        container_name: onchain-data-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG}
        command: ['pnpm', 'start:onchain-data']
        restart: unless-stopped
        networks: [production]
        environment: *workflows-environment

    typescript-worker:
        container_name: typescript-worker
        image: ghcr.io/reputo-org/reputo/workflows:${IMAGE_TAG}
        command: ['pnpm', 'start:algorithm-typescript']
        restart: unless-stopped
        networks: [production]
        environment: *workflows-environment
